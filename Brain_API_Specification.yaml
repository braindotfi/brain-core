openapi: 3.1.0
info:
  title: Brain API
  version: 0.2.0
  description: |
    The Brain API exposes six layers as HTTP endpoints plus one MCP surface.
    Raw (evidence), Ledger (normalized financial truth), Wiki (memory),
    Policy (governance), Agent (action orchestration), Audit (proof).

    v0.2.0 introduces the Normalized Ledger layer. The Wiki API is preserved
    but its role narrows to memory rendering and Q&A — financial truth lives
    in the Ledger. The Execution endpoints are renamed to Agent endpoints;
    legacy /execution/* paths remain shipped with deprecation headers for
    the duration of the v0.3 transition.

    All endpoints are tenant-scoped. Tenant identity is derived from the
    authenticated principal. The principal's tenant is never passed in URLs
    except where explicitly required for cross-tenant operations by platform
    administrators.

    Base URL: https://api.brain.fi/v1
    Protocol: HTTPS only. HTTP requests are rejected at the edge.
    Content type: application/json unless otherwise specified.
    Character encoding: UTF-8.
    Time: all timestamps are RFC 3339 UTC (example: 2026-04-23T11:45:00Z).
  contact:
    name: Brain Finance Inc.
    url: https://brain.fi
    email: api@brain.fi
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: https://api.brain.fi/v1
    description: Production
  - url: https://api.sandbox.brain.fi/v1
    description: Sandbox

security:
  - bearerAuth: []

tags:
  - name: Raw
    description: Immutable ingestion of financial evidence (Layer 1)
  - name: Ledger
    description: Normalized financial truth — accounts, balances, transactions, counterparties, obligations, invoices, documents, transfers, reconciliation matches (Layer 2)
  - name: Wiki
    description: Human-readable memory pages, search, Q&A. Pages are derived from Ledger + Raw (Layer 3)
  - name: Policy
    description: Rule composition, signing, evaluation against Ledger state (Layer 4)
  - name: Agent
    description: Agent registration and action orchestration (Layer 5). Replaces the v0.1 Execution group; legacy /execution/* paths still resolve.
  - name: Proposals
    description: Typed, customer-facing read surface for agent outputs across money and non-money proposals.
  - name: PaymentIntent
    description: PaymentIntent lifecycle — propose, approve, execute. Always passes the deterministic pre-execution gate (§6 of Engineering Standards).
  - name: Members
    description: Tenant members, roles, and approval authority. The normative actor model behind PaymentIntent approval and second-approval gating.
  - name: Tenancy
    description: |
      Production tenant creation, platform-identity session exchange, and
      member invites. Gated by a shared platform BFF credential
      (`X-Platform-Service-Auth`), not a JWT bearer scope — a distinct
      auth mechanism from the rest of the API. Separate from the sandbox
      self-serve `Auth` group.
  - name: Execution
    description: DEPRECATED — use Agent and PaymentIntent. Retained for v0.3 transition.
    x-deprecated-superseded-by: [Agent, PaymentIntent]
  - name: Audit
    description: Tamper-evident event log and verification (Layer 6)
  - name: MCP
    description: Model Context Protocol surface for external agents
  - name: Admin
    description: Platform administration (tenant-level operations)
  - name: Auth
    description: Self-serve onboarding & human (owner) authentication (RFC 0002). Public, rate-limited; available only when BRAIN_SELF_SERVE_SIGNUP is enabled.
  - name: Docs
    description: Public, read-only API documentation surface — the interactive reference UI and the raw OpenAPI contract it renders.
  - name: Reference
    description: Public, tenant-agnostic reference data with no truth or provenance coupling.

paths:
  /docs:
    get:
      tags: [Docs]
      summary: Interactive API reference (Scalar)
      description: |
        Public HTML page rendering this OpenAPI contract as an interactive
        reference, with same-origin "Try it out". Served by the gateway; the
        renderer bundle is loaded same-origin from `/v1/docs/scalar.js` and the
        spec from `/v1/openapi.yaml`.
      operationId: getDocs
      security: [] # public
      responses:
        "200":
          description: HTML documentation page.
          content:
            text/html:
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
  /openapi.yaml:
    get:
      tags: [Docs]
      summary: OpenAPI contract (YAML)
      description: Public, raw OpenAPI 3.1 document for this API — the source rendered by `/v1/docs`.
      operationId: getOpenApiYaml
      security: [] # public
      responses:
        "200":
          description: The OpenAPI document.
          content:
            application/yaml:
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
  /signup:
    post:
      tags: [Auth]
      summary: Self-serve tenant signup (sandbox)
      description: |
        Public, rate-limited. Provisions a new **sandbox** tenant and its owner
        user (email + password) and issues a single-use email-verification token.
        Registered only when self-serve signup is enabled
        (`BRAIN_SELF_SERVE_SIGNUP`); otherwise the route does not exist (404).
        New tenants are sandbox-only and grant **no** execution capability — real
        money stays behind the promotion + external-audit gates (RFC 0002).
      operationId: signup
      security: [] # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, maxLength: 320 }
                password:
                  type: string
                  minLength: 12
                  maxLength: 4096
                  description: Stored as a scrypt hash; never logged or returned.
      responses:
        '201':
          description: Tenant + owner provisioned (owner `pending` until email verified)
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  user_id: { type: string }
                  status: { type: string, enum: [pending] }
                  verification_token:
                    type: string
                    description: Returned only OUTSIDE production (no email provider wired yet); pass to POST /auth/verify-email.
                  verification_sent:
                    type: boolean
                    description: True in production (token emailed, not returned).
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: An account with this email already exists (signup_email_taken)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify an owner's email
      description: |
        Public, rate-limited. Consumes a single-use, short-TTL verification token
        (scoped by `tenant_id`) and activates the owner. An invalid, expired, or
        already-used token returns 400 (`signup_token_invalid`).
      operationId: verifyEmail
      security: [] # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token]
              properties:
                tenant_id: { type: string }
                token: { type: string }
      responses:
        '200':
          description: Email verified; owner activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
                  user_id: { type: string }
                  status: { type: string, enum: [active] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Owner password login
      description: |
        Public, rate-limited. Email + password → a short-lived owner JWT carrying
        **management / read / approve scopes only** — never `payment_intent:propose`,
        `payment_intent:execute`, or `execution:propose` (money movement is an agent
        + §6-gate concern, never a human-login capability). An unknown email and a
        wrong password return the SAME 401 (no user enumeration); an unverified
        account returns 403.
      operationId: ownerLogin
      security: [] # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Authenticated; owner JWT issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, enum: [Bearer] }
                  expires_in: { type: integer, description: Token lifetime in seconds. }
                  principal:
                    type: object
                    properties:
                      id: { type: string }
                      type: { type: string, enum: [user] }
                      tenantId: { type: string }
                      scopes: { type: array, items: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/siwx/challenge:
    post:
      tags: [Auth]
      summary: Request a Sign-In With X (EIP-4361) nonce
      description: |
        Public. Issues a one-time nonce, held server-side (Redis) with a
        5-minute TTL under `session_id`. The caller embeds the nonce in the
        EIP-4361 message it asks the wallet to sign, then posts the signed
        message to POST /auth/siwx along with `session_id`.
      operationId: siwxChallenge
      security: [] # public
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce: { type: string }
                  session_id: { type: string }
                  domain: { type: string, description: 'EIP-4361 domain claim the message must bind to, e.g. api.brain.fi' }

  /auth/siwx:
    post:
      tags: [Auth]
      summary: Sign in with a verified EIP-4361 (Sign-In With X) wallet signature
      description: |
        Public. Verifies the EIP-4361 message and signature; on success
        resolves the recovered address to a principal and issues a token:

          - A wallet linked to a human owner (RFC 0002 Phase D) mints an
            owner JWT with the same management/read/approve scopes as
            POST /auth/login, never propose/execute scopes.
          - Otherwise the address must match an `active` row in the agent
            registry (on-chain `BrainMCPAgentRegistry`-backed); the issued
            token carries `principal_type=agent` with the scope set drawn
            from the agent's registered role. An unregistered address
            returns 404 (`agent_not_found`).

        `session_id` is optional: when present, the stored nonce for that
        session must match the message's nonce (single-use, then deleted);
        when omitted, the message's own nonce is trusted as single-use.
      operationId: siwxVerify
      security: [] # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, signature]
              properties:
                message: { type: string, description: The EIP-4361 message text the wallet signed }
                signature: { type: string, description: Hex-encoded signature over `message` }
                session_id: { type: string, description: Session id returned by POST /auth/siwx/challenge }
      responses:
        '200':
          description: Authenticated; token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, enum: [Bearer] }
                  expires_in: { type: integer, description: Token lifetime in seconds. Default 3600 for agent tokens. }
                  principal:
                    type: object
                    properties:
                      id: { type: string }
                      type: { type: string, enum: [user, agent] }
                      tenantId: { type: string }
                      scopes: { type: array, items: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: SIWX session expired/missing, or the message/signature failed EIP-4361 verification. Error code `auth_siwx_invalid`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: The recovered address is not linked to a human owner and does not match an active registered agent. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tenants/{tenant_id}/wallets:
    post:
      tags: [Auth]
      summary: Link a wallet address to the tenant (RFC 0002 Phase D)
      description: |
        Owner JWT required, gated on `policy:write`. The path `tenant_id`
        must equal the authenticated principal's tenant. Once linked, the
        address can sign in via POST /auth/siwx. A human link defaults
        `principal_id` to the calling owner; an agent link must name the
        agent id explicitly. Registered only when self-serve onboarding is
        enabled.
      operationId: linkWallet
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, principal_type]
              properties:
                address: { type: string, pattern: '^0x[0-9a-fA-F]{40}$' }
                principal_type: { type: string, enum: [human, agent] }
                principal_id:
                  type: string
                  description: Defaults to the calling owner's id when principal_type=human. Required when principal_type=agent.
      responses:
        '201':
          description: Wallet linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked: { type: boolean, enum: [true] }
                  address: { type: string, description: Lowercased }
                  principal_type: { type: string, enum: [human, agent] }
                  principal_id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: |
            Missing `policy:write` scope, or the path `tenant_id` does not
            match the authenticated tenant. Error code
            `auth_scope_insufficient` or `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # TENANCY: production tenant creation, sessions, invites
  #############################################################################

  /tenants:
    post:
      tags: [Tenancy]
      summary: Create a production tenant with its founder bootstrap admin and agent
      description: |
        Public route (`skipAuth`), gated instead by the
        `X-Platform-Service-Auth` shared secret header
        (`BRAIN_PLATFORM_SERVICE_SECRET`) — not a JWT bearer scope.
        Rate-limited to 20/minute. Creates `tenant.kind='production'`,
        one active bootstrap admin member, a `platform`-surface identity
        link for the founder, an initial member session (access +
        refresh token pair), and the tenant's propose-only BFF service
        agent token. Rejects the request outright if the demo
        provisioning header (`X-Demo-Provision-Auth`) is also present, to
        keep the demo and production tenant-creation paths from being
        conflatable.
      operationId: createTenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [founder, founder_external_ref]
              properties:
                company_name: { type: string }
                founder:
                  type: object
                  required: [email]
                  properties:
                    email: { type: string, format: email }
                    display_name: { type: string, description: Defaults to email if omitted. }
                founder_external_ref:
                  type: string
                  description: Platform identity reference for the founder (linked with surface:platform).
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  member: { $ref: '#/components/schemas/Member' }
                  session:
                    type: object
                    properties:
                      token: { type: string }
                      refresh_token: { type: string }
                      expires_in: { type: integer, enum: [900] }
                  agent: { $ref: '#/components/schemas/ProductionAgentToken' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: |
            Missing/invalid `X-Platform-Service-Auth` header (error code
            `auth_token_invalid`, standard Error envelope), the platform
            secret is not configured on this deployment (error code
            `dependency_unavailable`), or the demo provisioning header
            was also present — that last case returns a bare
            `{ "reason": "platform_service_credential_required" }` body,
            NOT the standard Error envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      reason: { type: string, enum: [platform_service_credential_required] }
        '429': { $ref: '#/components/responses/RateLimited' }

  /orgs/{orgId}/tenants:
    post:
      tags: [Tenancy]
      summary: Create a production tenant for an organization
      description: |
        Organization-scoped alias for `POST /tenants`. It persists a
        production tenant with the same bootstrap admin, member session, and
        propose-only agent token behavior, and echoes `org_id` in the response.
      operationId: createOrgTenant
      security: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [founder, founder_external_ref]
              properties:
                company_name: { type: string }
                founder:
                  type: object
                  required: [email]
                  properties:
                    email: { type: string, format: email }
                    display_name: { type: string }
                founder_external_ref: { type: string }
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_id: { type: string }
                  tenant_id: { type: string }
                  member: { $ref: '#/components/schemas/Member' }
                  session:
                    type: object
                    properties:
                      token: { type: string }
                      refresh_token: { type: string }
                      expires_in: { type: integer, enum: [900] }
                  agent: { $ref: '#/components/schemas/ProductionAgentToken' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Missing or invalid platform credential.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /tenants/{tenantId}/agent-token:
    post:
      tags: [Tenancy]
      summary: Return or rotate a production tenant's propose-only agent token
      description: |
        Public route (`skipAuth`), gated instead by the
        `X-Platform-Service-Auth` shared secret header with the
        `tenant:agent-mint` operational scope. Production-only. Returns the
        active BFF service agent token when one exists, or mints one when no
        active token exists. Pass `{ "rotate": true }` to revoke the prior
        token id and mint a replacement. The token is a
        `principal_type=agent` JWT using the shared service-token propose-only
        scope set. It cannot approve, execute, sign, administer, or resolve as
        a member.
      operationId: mintProductionAgentToken
      security: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rotate:
                  type: boolean
                  default: false
                  description: Revoke the active token id before minting a replacement.
      responses:
        '200':
          description: Existing active token returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionAgentToken' }
        '201':
          description: Agent token minted or rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductionAgentToken' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Missing/invalid platform credential, or the platform secret is not configured. Error code `auth_token_invalid` or `dependency_unavailable`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Tenant is not production. Error code `auth_scope_insufficient`, details.reason `production_agent_required`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Tenant does not exist. Error code `tenant_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /sessions:
    post:
      tags: [Tenancy]
      summary: Exchange a platform identity for a member session
      description: |
        Public route (`skipAuth`), gated by `X-Platform-Service-Auth`.
        Rate-limited to 60/minute. Resolves `external_ref` to a member
        via its `platform`-surface identity link; the member must be
        `status: active`. Optional `scopes` may request a reduced
        subset of the member session entitlements. The server rejects
        any scope the member session does not hold and never widens
        privilege.
      operationId: createSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_ref]
              properties:
                external_ref: { type: string }
                scopes:
                  type: array
                  items: { type: string }
                  description: Optional reduced scope subset for the access token.
      responses:
        '200':
          description: Session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refresh_token: { type: string }
                  expires_in: { type: integer, enum: [900] }
                  scopes:
                    type: array
                    items: { type: string }
                    description: Scopes granted to the access token and refresh family.
                  member: { $ref: '#/components/schemas/Member' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Missing/invalid platform credential, or the platform secret is not configured. Error code `auth_token_invalid` or `dependency_unavailable`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: 'No member is linked to this external_ref, or the linked member is not active. Returns `{ "reason": "session_identity_unlinked" }`, NOT the standard Error envelope.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason: { type: string, enum: [session_identity_unlinked] }
        '429': { $ref: '#/components/responses/RateLimited' }
    delete:
      tags: [Tenancy]
      summary: Revoke the caller's member refresh tokens
      description: |
        Requires a `user`-type JWT principal (standard bearer auth, no
        platform credential). Revokes every non-revoked refresh token
        for the calling member; does not invalidate the current access
        token, which remains valid until it expires.
      operationId: deleteSession
      responses:
        '200':
          description: Refresh tokens revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: boolean, enum: [true] }
        '403':
          description: Caller is not a user-type principal. Error code `payment_intent_approval_invalid`, `details.reason=actor_unresolved`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions/refresh:
    post:
      tags: [Tenancy]
      summary: Rotate a refresh token for a new access + refresh token pair
      description: |
        Public route (`skipAuth`) — no platform credential or bearer
        token required, only the refresh token itself. Rate-limited to
        60/minute. Refresh tokens are single-use: a token that has
        already been rotated once is treated as reuse (potential theft)
        and revokes the entire token family. Optional `scopes` may
        further narrow the stored refresh-family scope set, but may not
        request a scope outside that set.
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
                scopes:
                  type: array
                  items: { type: string }
                  description: Optional further reduced scope subset for the rotated token.
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refresh_token: { type: string }
                  expires_in: { type: integer, enum: [900] }
                  scopes:
                    type: array
                    items: { type: string }
                    description: Scopes granted to the rotated access token and refresh family.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: |
            Refresh token is unknown, revoked, or expired, or it was
            already rotated once before (reuse — the entire token family
            is revoked as a side effect of this response). Error code
            `auth_token_invalid`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /invites/consume:
    post:
      tags: [Tenancy]
      summary: Consume a member invite token and open a session
      description: |
        Public route (`skipAuth`), gated by `X-Platform-Service-Auth`.
        Rate-limited to 60/minute. Links the platform `external_ref` to
        the invited member, activates the member (`status: invited` ->
        `active`), marks the invite consumed, and issues an initial
        member session. `display_name` overrides the member's display
        name if provided.
      operationId: consumeInvite
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_token, external_ref]
              properties:
                invite_token: { type: string }
                external_ref: { type: string }
                display_name: { type: string }
      responses:
        '200':
          description: Invite consumed; member activated and session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  member: { $ref: '#/components/schemas/Member' }
                  session:
                    type: object
                    properties:
                      token: { type: string }
                      refresh_token: { type: string }
                      expires_in: { type: integer, enum: [900] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Missing/invalid platform credential, or the platform secret is not configured. Error code `auth_token_invalid` or `dependency_unavailable`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            Invite token is unknown (`{ "reason": "invite_invalid" }`,
            NOT the standard Error envelope), or it was found but is
            blocked: error code `invite_expired`, `invite_consumed`, or
            `invite_revoked` (standard Error envelope for these three).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      reason: { type: string, enum: [invite_invalid] }
        '429': { $ref: '#/components/responses/RateLimited' }

  /tenants/{tenantId}/keys:
    post:
      tags: [Tenancy]
      summary: Issue a Brain API key
      description: |
        Requires an authenticated same-tenant admin session. Generates a
        `brain_sk_test_...` or `brain_sk_live_...` secret, stores only
        SHA-256 over `BRAIN_API_KEY_PEPPER + "." + secret`, and returns the
        plaintext secret exactly once. Current API-key scopes are
        `ledger:read` and `audit:read`.
      operationId: issueApiKey
      parameters:
        - name: tenantId
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, environment, scopes]
              properties:
                name: { type: string, description: Developer-supplied key label. }
                environment: { type: string, enum: [sandbox, live] }
                scopes:
                  type: array
                  items: { type: string, enum: ['ledger:read', 'audit:read'] }
      responses:
        '201':
          description: API key issued; plaintext key returned exactly once
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  tenant_id: { type: string }
                  name: { type: string }
                  environment: { type: string, enum: [sandbox, live] }
                  scopes: { type: array, items: { type: string } }
                  key_prefix: { type: string }
                  key_last4: { type: string }
                  masked_key: { type: string }
                  created_at: { type: string, format: date-time }
                  last_used_at: { type: [string, "null"], format: date-time }
                  revoked_at: { type: [string, "null"], format: date-time }
                  rotated_from_id: { type: [string, "null"] }
                  secret: { type: string, description: 'Plaintext key. Shown only in this response.' }
        '400':
          description: Invalid body. Error code `request_body_invalid`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Principal is not a same-tenant admin. Error code `auth_scope_insufficient` or `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Tenant does not exist. Error code `tenant_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
    get:
      tags: [Tenancy]
      summary: List Brain API keys
      description: |
        Requires an authenticated same-tenant admin session. Returns masked
        key metadata only. The plaintext secret is never returned by this
        endpoint.
      operationId: listApiKeys
      parameters:
        - name: tenantId
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: API keys for the tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        tenant_id: { type: string }
                        name: { type: string }
                        environment: { type: string, enum: [sandbox, live] }
                        scopes: { type: array, items: { type: string } }
                        key_prefix: { type: string }
                        key_last4: { type: string }
                        masked_key: { type: string }
                        created_at: { type: string, format: date-time }
                        last_used_at: { type: [string, "null"], format: date-time }
                        revoked_at: { type: [string, "null"], format: date-time }
                        rotated_from_id: { type: [string, "null"] }
        '403':
          description: Principal is not a same-tenant admin.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /keys/{keyId}/rotate:
    post:
      tags: [Tenancy]
      summary: Rotate a Brain API key
      description: |
        Requires an authenticated same-tenant admin session. Atomically revokes
        the old key and issues a replacement with the same name, environment,
        and scopes. Returns the new plaintext secret exactly once.
      operationId: rotateApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema: { type: string, pattern: '^akey_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '201':
          description: Key rotated; replacement secret returned exactly once
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '403':
          description: Principal is not a same-tenant admin.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Key does not exist or is not active. Error code `api_key_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /keys/{keyId}:
    delete:
      tags: [Tenancy]
      summary: Revoke a Brain API key
      description: |
        Requires an authenticated same-tenant admin session. Sets
        `revoked_at`; keys are never hard-deleted.
      operationId: revokeApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema: { type: string, pattern: '^akey_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '204':
          description: Key revoked (or already revoked)
        '403':
          description: Principal is not a same-tenant admin.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Key does not exist. Error code `api_key_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /tenants/{tenantId}/usage:
    get:
      tags: [Tenancy]
      summary: Aggregate per-key usage
      description: |
        Requires `audit:read` for the same tenant. Counts attributed audit
        events over the requested window and optionally filters by environment
        and key id.
      operationId: getTenantUsage
      parameters:
        - name: tenantId
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
        - name: window
          in: query
          required: false
          schema: { type: string, default: 30d }
        - name: environment
          in: query
          required: false
          schema: { type: string, enum: [sandbox, live] }
        - name: key_id
          in: query
          required: false
          schema: { type: string, pattern: '^akey_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Usage counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  window: { type: string }
                  environment: { type: string }
                  key_id: { type: string }
                  total_events: { type: integer }
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        key_id: { type: string }
                        environment: { type: [string, "null"] }
                        event_count: { type: integer }
                        first_event_at: { type: [string, "null"], format: date-time }
                        last_event_at: { type: [string, "null"], format: date-time }
        '403':
          description: Principal lacks tenant access or `audit:read`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }

  #############################################################################
  # LAYER 1: RAW
  #############################################################################

  /raw/ingest:
    post:
      tags: [Raw]
      summary: Ingest a financial artifact
      description: |
        Requires `raw:write`. Accepts a financial artifact via direct
        upload or URL reference. Content is stored immutably with SHA-256
        content addressing. Duplicate artifacts (same tenant, same
        SHA-256) return the existing raw_id.
      operationId: ingestRaw
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [source_type, file]
              properties:
                source_type:
                  $ref: '#/components/schemas/RawSourceType'
                source_ref:
                  type: object
                  description: Source-specific identifiers (e.g. Plaid transaction ID)
                  additionalProperties: true
                file:
                  type: string
                  format: binary
                  description: The artifact content. Max 50 MB.
                mime_type:
                  type: string
                  description: Override auto-detected MIME type
                source_schema:
                  type: string
                  maxLength: 128
                  description: >
                    Declared payload schema tag (e.g. acme_bank.transactions.v1).
                    Stored verbatim, never parsed at intake. An unknown schema
                    still ingests and waits for a parser.
                object_type:
                  type: string
                  maxLength: 128
                  description: Provider object type the payload describes (e.g. invoice)
                external_id:
                  type: string
                  maxLength: 256
                  description: Provider-side id of the described object
                operation:
                  type: string
                  enum: [upsert, delete, snapshot]
                  description: What the source asserts this artifact does to the object
                effective_at:
                  type: string
                  format: date-time
                  description: When the fact applied in the real world
                observed_at:
                  type: string
                  format: date-time
                  description: When the source exposed the fact
                idempotency_key:
                  type: string
                  maxLength: 256
                  description: >
                    Caller idempotency key (connection:resource:object:version).
                    Unique per tenant; a re-send with different bytes still dedups.
          application/json:
            schema:
              type: object
              required: [source_type, url]
              properties:
                source_type:
                  $ref: '#/components/schemas/RawSourceType'
                source_ref:
                  type: object
                  additionalProperties: true
                url:
                  type: string
                  format: uri
                  description: URL to fetch (server-side). Must be HTTPS.
                auth_header:
                  type: string
                  description: Optional Authorization header value for the fetch
                source_schema:
                  type: string
                  maxLength: 128
                  description: >
                    Declared payload schema tag (e.g. acme_bank.transactions.v1).
                    Stored verbatim, never parsed at intake.
                object_type:
                  type: string
                  maxLength: 128
                external_id:
                  type: string
                  maxLength: 256
                operation:
                  type: string
                  enum: [upsert, delete, snapshot]
                effective_at:
                  type: string
                  format: date-time
                observed_at:
                  type: string
                  format: date-time
                idempotency_key:
                  type: string
                  maxLength: 256
      responses:
        '201':
          description: Artifact ingested (new)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawIngestResponse'
        '200':
          description: Artifact already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawIngestResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /raw/webhooks/{provider}:
    post:
      tags: [Raw]
      summary: Webhook ingestion from a known provider
      description: |
        HMAC-authenticated webhook endpoint (`skipAuth`; the provider
        signature replaces bearer auth). Only `plaid` has signature
        verification always wired; `stripe` verifies when
        `stripeVerify` credentials are configured, else 501.
        `alchemy`, `netsuite`, and `generic_hmac` are enum placeholders
        with no wired verification yet and also return 501.
      operationId: ingestWebhook
      security: []  # HMAC signature replaces bearer auth
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [plaid, stripe, alchemy, netsuite, generic_hmac]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provider-specific payload
      responses:
        '202':
          description: Webhook accepted for async processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: boolean }
                  trace_id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Provider has no wired signature verification (stripe without configured credentials, alchemy, netsuite, generic_hmac).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /raw/{raw_id}:
    get:
      tags: [Raw]
      summary: Retrieve a raw artifact
      description: |
        Requires `raw:read`. Returns a short-lived signed URL (10 minute
        expiry) pointing at the artifact in Azure Blob Storage. The
        artifact itself is served with Content-Disposition: attachment.
      operationId: getRaw
      parameters:
        - $ref: '#/components/parameters/RawId'
      responses:
        '200':
          description: Signed URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                  sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
                  signed_url: { type: string, format: uri }
                  expires_at: { type: string, format: date-time }
                  mime_type: { type: string }
                  bytes: { type: integer, minimum: 0 }
        '404':
          description: No such artifact. Error code `raw_artifact_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: Artifact has been tombstoned. Error code `raw_artifact_tombstoned`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Raw]
      summary: Tombstone a raw artifact
      description: |
        Requires `raw:admin` (not `raw:write`). Writes a tombstone record.
        The underlying artifact is retained in storage per regulatory
        retention policy but becomes inaccessible via the API and is
        filtered from all Wiki derivations.
      operationId: tombstoneRaw
      parameters:
        - $ref: '#/components/parameters/RawId'
      responses:
        '204':
          description: Tombstoned
        '404':
          description: No such artifact. Error code `raw_artifact_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: 'Already tombstoned. Returns `{ raw_id, tombstoned: true }`, not the Error schema.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw_id: { type: string }
                  tombstoned: { type: boolean, enum: [true] }

  /raw/{raw_id}/extract:
    post:
      tags: [Raw]
      summary: Trigger document extraction for a raw artifact
      description: |
        Requires `raw:write`. Enqueues or re-enqueues an async document
        extraction job for the referenced artifact. The request never calls the
        document extraction agent inline. A terminal succeeded job for the same
        raw artifact and content hash is reused.
      operationId: extractRawDocument
      parameters:
        - $ref: '#/components/parameters/RawId'
      responses:
        '200':
          description: Document extraction job accepted or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawExtractionJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: Artifact has been tombstoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Artifact cannot be extracted by the document agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /raw/{raw_id}/extraction:
    get:
      tags: [Raw]
      summary: Get latest document extraction job status
      description: |
        Requires `raw:read`. Returns the latest async extraction job for the
        artifact. If no job exists, returns `extraction_job_not_found`.
      operationId: getRawDocumentExtraction
      parameters:
        - $ref: '#/components/parameters/RawId'
      responses:
        '200':
          description: Latest document extraction job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawExtractionJob'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /raw/{raw_id}/parsed:
    get:
      tags: [Raw]
      summary: Retrieve parsed output for an artifact
      description: Requires `raw:read`. Returns normalized output from all parser versions.
      operationId: getRawParsed
      parameters:
        - $ref: '#/components/parameters/RawId'
        - name: parser
          in: query
          schema:
            type: string
          description: Filter to a specific parser
        - name: parser_version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Parsed output
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                  parsed:
                    type: array
                    items:
                      $ref: '#/components/schemas/RawParsed'
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Raw]
      summary: Write a parsed (stage-3) record for an artifact
      description: >
        Requires `raw:write`. Records one parser-output row for the
        referenced artifact. Called by extraction workers and first-party
        extractor agents (e.g. document_extractor); it is the stage-3
        producer of `raw_parsed`. Naturally idempotent on the
        (raw_artifact_id, parser, parser_version) tuple: re-posting the
        same tuple returns the existing row with 200. Writing into Ledger
        remains the Ledger normalize service's job; this endpoint never
        touches Ledger.
      operationId: writeRawParsed
      parameters:
        - $ref: '#/components/parameters/RawId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parser, parser_version, extracted]
              properties:
                parser: { type: string, minLength: 1, maxLength: 128 }
                parser_version: { type: string, minLength: 1, maxLength: 64 }
                extracted:
                  type: object
                  additionalProperties: true
                confidence: { type: number, minimum: 0, maximum: 1 }
      responses:
        '201':
          description: Parsed record created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawParsed' }
        '200':
          description: Parsed record already existed (idempotent re-post)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RawParsed' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No such artifact. Error code `raw_artifact_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: Artifact has been tombstoned. Error code `raw_artifact_tombstoned`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sources:
    post:
      tags: [Raw]
      summary: Connect a source
      description: |
        Connects a source connector for this tenant. Idempotent (config:
        `idempotent: true`). Requires `raw:write`.
      operationId: connectSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, credentials]
              properties:
                type: { $ref: '#/components/schemas/SourceType' }
                credentials:
                  type: object
                  additionalProperties: true
                  description: Adapter-specific credentials, validated per connector. Never echoed back in responses.
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Source connected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Source' }
        '400': { $ref: '#/components/responses/BadRequest' }
    get:
      tags: [Raw]
      summary: List connected sources
      description: |
        Requires `raw:read`. Cursor pagination is keyset-based and opaque.
        Pass the previous response `next_cursor` unchanged to fetch the next
        page. Malformed cursors return `invalid_cursor`.
      operationId: listSources
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/SourceType' }
        - name: status
          in: query
          schema: { type: string, enum: [active, paused, error, disconnected] }
        - name: limit
          in: query
          schema: { type: integer }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Source list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Source' }
                  next_cursor: { type: [string, "null"] }
        '400': { $ref: '#/components/responses/BadRequest' }

  /sources/{source_id}:
    get:
      tags: [Raw]
      summary: Get a source
      description: Requires `raw:read`.
      operationId: getSource
      parameters:
        - name: source_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Source
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Source' }
        '404':
          description: No such source. Error code `source_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Raw]
      summary: Disconnect a source
      description: Requires `raw:write`. Marks the source disconnected; does not delete previously ingested artifacts.
      operationId: disconnectSource
      parameters:
        - name: source_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Source disconnected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Source' }
        '404':
          description: No such source. Error code `source_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sources/{source_id}/sync:
    post:
      tags: [Raw]
      summary: Trigger a sync for a source
      description: |
        Requires `raw:write`. Stub connectors (netsuite, email_inbound,
        csv_upload, pdf_upload, alchemy_wallet, eth_address) return
        immediately with `notes: "stub"` rather than performing a real sync.
        The returned `job_id` can be polled with
        `GET /sources/{source_id}/sync/{job_id}`.
      operationId: syncSource
      parameters:
        - name: source_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Sync enqueued or running
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceSyncJob' }
        '404':
          description: No such source. Error code `source_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sources/{source_id}/sync/{job_id}:
    get:
      tags: [Raw]
      summary: Get source sync job status
      description: Requires `raw:read`. Returns the tenant-scoped status for a source sync job.
      operationId: getSourceSyncJob
      parameters:
        - name: source_id
          in: path
          required: true
          schema: { type: string }
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sync job status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceSyncJob' }
        '404':
          description: No such source or sync job. Error code `source_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # LAYER 2: LEDGER
  #############################################################################

  /ledger/accounts:
    get:
      tags: [Ledger]
      summary: List accounts
      description: |
        Requires `ledger:read`. Cursor pagination is keyset-based and
        opaque. Pass `next_cursor` unchanged to fetch the next page.
      operationId: listAccounts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed, frozen, pending]
        - name: account_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items: { $ref: '#/components/schemas/Account' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/accounts/{account_id}:
    get:
      tags: [Ledger]
      summary: Account detail
      description: Requires `ledger:read`.
      operationId: getAccount
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Account detail with most recent balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  account: { $ref: '#/components/schemas/Account' }
                  latest_balance: { $ref: '#/components/schemas/Balance' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ledger/balances:
    get:
      tags: [Ledger]
      summary: Point-in-time balances
      description: Requires `ledger:read`.
      operationId: listBalances
      parameters:
        - name: account_id
          in: query
          schema: { type: string }
        - name: as_of
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Balance list
          content:
            application/json:
              schema:
                type: object
                properties:
                  balances:
                    type: array
                    items: { $ref: '#/components/schemas/Balance' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/transactions:
    get:
      tags: [Ledger]
      summary: List transactions
      description: |
        Requires `ledger:read`. Cursor pagination is keyset-based and
        opaque. Pass `next_cursor` unchanged to fetch the next page.
      operationId: listTransactions
      parameters:
        - name: account_id
          in: query
          schema: { type: string }
        - name: counterparty_id
          in: query
          schema: { type: string }
        - name: direction
          in: query
          schema: { type: string, enum: [inflow, outflow, transfer, adjustment] }
        - name: status
          in: query
          schema: { type: string, enum: [pending, posted, cleared, failed, reversed, disputed] }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items: { $ref: '#/components/schemas/Transaction' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/transactions/{transaction_id}:
    get:
      tags: [Ledger]
      summary: Transaction detail
      description: Requires `ledger:read`.
      operationId: getTransaction
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Transaction
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ledger/counterparties:
    get:
      tags: [Ledger]
      summary: List/search counterparties
      description: |
        Requires `ledger:read`. Cursor pagination is keyset-based and
        opaque. Pass `next_cursor` unchanged to fetch the next page.
      operationId: listCounterparties
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema:
            type: string
            enum: [merchant, vendor, customer, employer, employee, bank, wallet, exchange, tax_authority, agent, other]
        - name: verified_status
          in: query
          schema:
            type: string
            enum: [unverified, self_attested, document_verified, sanctions_cleared]
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Counterparty list
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparties:
                    type: array
                    items: { $ref: '#/components/schemas/Counterparty' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [Ledger]
      summary: Manually create or merge a counterparty
      description: |
        Requires `ledger:write`. Identity-only: payment rail fields (IBAN,
        account number, routing, SWIFT, BIC, wallet, bank details) are
        rejected with `payment_fields_not_allowed`, never written. Unknown
        body fields return `unknown_field`; server-controlled trust fields
        (`provenance`, `confidence`, `verified_status`, `risk_level`)
        return `field_not_editable`. Provenance is derived from the
        principal, not the request body: user principals write
        `human_confirmed`, agent and API partner principals write
        `agent_contributed`.
      operationId: createCounterparty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                display_name: { type: string }
                type:
                  type: string
                  enum: [merchant, vendor, customer, employer, employee, bank, wallet, exchange, tax_authority, agent, other]
                country: { type: string }
                tax_id: { type: string }
                category: { type: string }
                contact_email: { type: string }
                aliases:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Counterparty created
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty: { $ref: '#/components/schemas/Counterparty' }
                  created: { type: boolean }
                  merged: { type: boolean }
        '200':
          description: Existing counterparty merged
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty: { $ref: '#/components/schemas/Counterparty' }
                  created: { type: boolean }
                  merged: { type: boolean }
        '400':
          description: |
            Error code `request_body_invalid`; `details.reason` is one of
            `payment_fields_not_allowed`, `unknown_field`, `field_not_editable`
            (each with `details.fields` listing the offending keys), or
            `invalid_type`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /ledger/counterparties/{counterparty_id}:
    get:
      tags: [Ledger]
      summary: Counterparty detail
      description: Requires `ledger:read`.
      operationId: getCounterparty
      parameters:
        - name: counterparty_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Counterparty
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Counterparty' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Ledger]
      summary: Edit counterparty identity fields
      description: |
        Requires `ledger:write` and a user principal (agent and API
        partner principals are rejected). Identity-only, same field
        restrictions as create: payment rail fields return
        `payment_fields_not_allowed`, unknown fields return
        `unknown_field`, server-controlled trust fields return
        `field_not_editable`. Renaming preserves the previous name as an
        alias; aliases are append-only.
      operationId: updateCounterpartyIdentity
      parameters:
        - name: counterparty_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                display_name: { type: string }
                country: { type: string }
                tax_id: { type: string }
                category: { type: string }
                contact_email: { type: string }
                aliases:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Counterparty updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty: { $ref: '#/components/schemas/Counterparty' }
        '400':
          description: |
            Error code `request_body_invalid`; `details.reason` is one of
            `payment_fields_not_allowed`, `unknown_field`, or
            `field_not_editable` (with `details.fields` listing the
            offending keys).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Caller is not a user principal. Error code `payment_intent_approval_invalid`, `details.reason=actor_unresolved`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Rename conflicts with another counterparty. Error code `ledger_reconciliation_conflict`, `details.reason=name_conflict`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /ledger/obligations:
    get:
      tags: [Ledger]
      summary: List obligations (bills, invoices, subscriptions)
      description: |
        Requires `ledger:read`. Cursor pagination is keyset-based and
        opaque. Pass `next_cursor` unchanged to fetch the next page.
      operationId: listObligations
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [upcoming, due, paid, overdue, cancelled, disputed] }
        - name: type
          in: query
          schema: { type: string }
        - name: due_before
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Obligation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  obligations:
                    type: array
                    items: { $ref: '#/components/schemas/Obligation' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/obligations/{obligation_id}/resolved:
    get:
      tags: [Ledger]
      summary: Resolved cross-source view of an obligation (observations, authority, conflicts)
      description: |
        Requires `ledger:read`. The reconciled fact for one obligation:
        every source observation retained, field-level authority (which
        source owns each field), conflicts listed where sources disagree,
        and duplicate candidates pending user review. The "explain this
        number, including where sources disagree" surface (Phase 4
        resolution / §13).
      operationId: resolveObligation
      parameters:
        - name: obligation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resolved obligation view
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolvedObligationView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ledger/counterparties/{counterparty_id}/resolved:
    get:
      tags: [Ledger]
      summary: Resolved organization view of a counterparty (linked observations, facets)
      description: |
        Requires `ledger:read`. The reconciled organization for one
        counterparty: linked observations across sources/types unioned
        into facets, name variants listed, and duplicate candidates
        pending user review (Phase 4 resolution / §13).
      operationId: resolveCounterparty
      parameters:
        - name: counterparty_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resolved counterparty view
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolvedCounterpartyView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ledger/accounts/{account_id}/resolved:
    get:
      tags: [Ledger]
      summary: Resolved money-pool view of an account (per-observation balances, links)
      description: |
        Requires `ledger:read`. The reconciled money pool for one account:
        balances reported per observation (never adjudicated),
        confirmed-duplicate links followed, candidates pending user
        review. Account duplicates never auto-match (Phase 4 / §13), so
        member links here are human-confirmed.
      operationId: resolveAccount
      parameters:
        - name: account_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resolved account view
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolvedAccountView' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ledger/invoices:
    get:
      tags: [Ledger]
      summary: List invoices
      description: |
        Requires `ledger:read`. Cursor pagination is keyset-based and
        opaque. Pass `next_cursor` unchanged to fetch the next page.
      operationId: listInvoices
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: counterparty_id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items: { $ref: '#/components/schemas/Invoice' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/invoices/{invoice_id}:
    get:
      tags: [Ledger]
      summary: Invoice detail
      description: Requires `ledger:read`.
      operationId: getInvoice
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invoice
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invoice' }
        '404': { $ref: '#/components/responses/NotFound' }
  /ledger/normalize:
    post:
      tags: [Ledger]
      summary: Idempotently normalize a Raw artifact into Ledger rows
      description: |
        Requires `ledger:write`. Normalizes a raw_parsed row into Ledger
        entities. Idempotent: re-running with the same input returns the
        same Ledger row ids. Used by the extractor pipeline and by
        /wiki/annotate's write-through path.
      operationId: normalizeRaw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_parsed_id]
              properties:
                raw_parsed_id: { type: string }
                target_entities:
                  type: array
                  description: Optional restriction; default is all relevant entities
                  items:
                    type: string
                    enum: [account, balance, transaction, counterparty, obligation, document, category, transfer, invoice]
      responses:
        '200':
          description: Normalization result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ledger_rows_created:
                    type: array
                    items:
                      type: object
                      properties:
                        entity: { type: string }
                        id: { type: string }

        '400': { $ref: '#/components/responses/BadRequest' }
  /ledger/reconcile:
    post:
      tags: [Ledger]
      summary: Run the reconciliation engine over recent ledger rows
      description: Requires `ledger:write`.
      operationId: runReconciliation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                since:
                  type: string
                  format: date-time
                match_types:
                  type: array
                  items:
                    type: string
                    enum: [transaction_receipt, invoice_payment, statement_balance, wallet_transfer, payroll_bank_debit, subscription_charge, card_charge]
      responses:
        '202':
          description: Reconciliation enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }

        '400': { $ref: '#/components/responses/BadRequest' }
        '501':
          description: ReconciliationService not configured for this app instance. Error code `raw_source_unsupported`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /ledger/reconciliation-matches:
    get:
      tags: [Ledger]
      summary: List reconciliation matches
      description: Requires `ledger:read`.
      operationId: listReconciliationMatches
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: match_type
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Match list
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items: { $ref: '#/components/schemas/ReconciliationMatch' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /ledger/cash_flows:
    get:
      tags: [Ledger]
      summary: Cash-flow aggregation over a trailing window
      description: |
        Requires `ledger:read`. Aggregates transactions in the trailing
        `days` window (default 30, max 365) by currency and by day. Pulls
        up to 1000 transactions per request; very high-volume tenants may
        not see the full window reflected (no cursor pagination yet).
      operationId: getCashFlows
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30, minimum: 1, maximum: 365 }
        - name: currency
          in: query
          schema: { type: string, pattern: '^[A-Z]{3}$' }
      responses:
        '200':
          description: Cash-flow summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CashFlowSummary' }
        '400':
          description: Malformed `currency`. Error code `request_params_invalid`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # LAYER 3: WIKI (memory)
  #############################################################################

  # Wiki memory pages — derived from Ledger + Raw, regenerable on demand.
  /memory/pages:
    get:
      tags: [Wiki]
      summary: List/search wiki pages
      description: Requires `wiki:read`.
      operationId: listMemoryPages
      parameters:
        - name: page_type
          in: query
          schema:
            type: string
            enum: [account, counterparty, obligation, invoice, agent, policy, monthly_summary, cash_flow]
        - name: q
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items: { $ref: '#/components/schemas/WikiPage' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /memory/pages/{slug_or_id}:
    get:
      tags: [Wiki]
      summary: Get a single wiki page
      description: Requires `wiki:read`.
      operationId: getMemoryPage
      parameters:
        - name: slug_or_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WikiPage' }
        '404':
          description: No such page. Error code `wiki_page_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /memory/regenerate:
    post:
      tags: [Wiki]
      summary: Regenerate a wiki page from current Ledger state
      description: |
        Despite being a POST, requires only `wiki:read` (not `wiki:write`)
        — regeneration re-derives the page from existing Ledger/Raw state
        rather than writing new source-of-truth data.
      operationId: regenerateMemoryPage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug_or_id]
              properties:
                slug_or_id: { type: string }
      responses:
        '200':
          description: Regenerated page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WikiPage' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /memory/search:
    get:
      tags: [Wiki]
      summary: Semantic + lexical search across wiki pages
      description: Requires `wiki:read`.
      operationId: searchMemory
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        page: { $ref: '#/components/schemas/WikiPage' }
                        score: { type: number }

        '400': { $ref: '#/components/responses/BadRequest' }
  /wiki/entity/{entity_id}:
    get:
      tags: [Wiki]
      summary: Fetch an entity with one-hop neighbors
      description: Requires `wiki:read`.
      operationId: getWikiEntity
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - name: include_neighbors
          in: query
          schema: { type: boolean, default: true }
        - name: as_of
          in: query
          schema: { type: string, format: date-time }
          description: Bitemporal query. If omitted, current state.
      responses:
        '200':
          description: Entity and neighbors
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity:
                    $ref: '#/components/schemas/WikiEntity'
                  neighbors:
                    type: array
                    items:
                      type: object
                      properties:
                        relation: { $ref: '#/components/schemas/WikiRelation' }
                        entity: { $ref: '#/components/schemas/WikiEntity' }
        '404':
          description: No such entity. Error code `wiki_entity_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /wiki/entity/{entity_id}/evidence:
    get:
      tags: [Wiki]
      summary: Retrieve the evidence chain for an entity
      description: |
        Requires `wiki:read`. Returns the full provenance chain: every
        raw_parsed record and extraction path that produced this entity
        and its attributes.
      operationId: getEntityEvidence
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Evidence chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceChain'

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No versions found for this entity. Error code `wiki_entity_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /wiki/entity/{entity_id}/history:
    get:
      tags: [Wiki]
      summary: All temporal versions of an entity
      description: Requires `wiki:read`.
      operationId: getEntityHistory
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                  versions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WikiEntity'

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No versions found for this entity. Error code `wiki_entity_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /wiki/search:
    get:
      tags: [Wiki]
      summary: Search the Wiki
      description: Requires `wiki:read`.
      operationId: searchWiki
      parameters:
        - name: kind
          in: query
          schema: { $ref: '#/components/schemas/EntityKind' }
        - name: q
          in: query
          schema: { type: string }
          description: Full-text query over entity attributes
        - name: semantic
          in: query
          schema: { type: string }
          description: Semantic query using pgvector embeddings
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/WikiEntity' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /wiki/question:
    post:
      tags: [Wiki]
      summary: Natural-language question against the Wiki
      description: |
        Requires `wiki:read`. Translates a natural-language question into
        a set of SQL queries against the Wiki, executes them, and
        composes an answer with an evidence path attached. This is the
        LLM-in-hot-path endpoint. Costs apply per call; see pricing
        documentation.
      operationId: askWiki
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  minLength: 1
                  maxLength: 2000
                as_of:
                  type: string
                  format: date-time
                  description: Evaluate against the Wiki as of this time
                max_evidence_depth:
                  type: integer
                  default: 3
                  maximum: 5
      responses:
        '200':
          description: Answer with evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WikiAnswer'
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /wiki/annotate:
    post:
      tags: [Wiki]
      summary: Human correction on an entity or relation
      description: |
        Requires `wiki:write`. Submits a structured correction. Corrections
        are applied as a new temporal version with
        provenance=human_confirmed. The original version is retained.
        Rate-limited per (tenant, principal): 60/hour by default
        (`WIKI_ANNOTATION_RATE_PER_HOUR`), checked before any write.
      operationId: annotateWiki
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/EntityAnnotation'
                - $ref: '#/components/schemas/RelationAnnotation'
      responses:
        '201':
          description: Annotation applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  annotation_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                  new_version_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: 'entity_id was provided but no such entity exists. Error code `wiki_entity_not_found`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Annotation rate limit exceeded. Error code `rate_limit_exceeded`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /wiki/schema:
    get:
      tags: [Wiki]
      summary: Retrieve current JSON schemas per entity and relation kind
      description: Requires `wiki:read`.
      operationId: getWikiSchema
      parameters:
        - name: kind
          in: query
          schema: { type: string }
      responses:
        '200':
          description: JSON schemas
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  description: JSON Schema document for the kind
                  type: object
        '400': { $ref: '#/components/responses/BadRequest' }

  #############################################################################
  # LAYER 4: POLICY
  #############################################################################

  /policy/{tenant_id}:
    get:
      tags: [Policy]
      summary: Get the active policy for a tenant
      description: |
        Requires `policy:read`. The path `tenant_id` must equal the
        authenticated principal's tenant (cross-tenant reads are rejected
        with `auth_tenant_mismatch`, not 404).
      operationId: getActivePolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Active policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No active policy for this tenant. Error code `policy_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /policy/{tenant_id}/versions:
    get:
      tags: [Policy]
      summary: List policy versions
      description: Requires `policy:read` and matching path/token tenant.
      operationId: listPolicyVersions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: '#/components/schemas/Policy' }

        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /policy/{tenant_id}/compose:
    post:
      tags: [Policy]
      summary: Compose a new policy, returns signing payload
      description: |
        Requires `policy:write` and matching path/token tenant. Validates
        the proposed policy against the DSL schema, inserts it in `draft`
        state, transitions it to `pending_signatures`, and returns an
        EIP-712 typed-data signing payload. Caller then signs with the
        appropriate keys and submits via /sign.
      operationId: composePolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  $ref: '#/components/schemas/PolicyDSL'
                quorum_required: { type: integer, default: 1 }
      responses:
        '200':
          description: Signing payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id: { type: string }
                  state: { type: string, enum: [pending_signatures] }
                  signing_payload:
                    description: EIP-712 typed data document to sign
                    type: object
        '400':
          description: '`content` must be `{ version: number, rules: [] }`. Error code `policy_rule_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /policy/{tenant_id}/sign:
    post:
      tags: [Policy]
      summary: Submit signatures for a composed policy
      description: |
        Requires `policy:sign` and matching path/token tenant. Each
        signature is verified against the EIP-712 typed data for the
        policy; signers must be distinct and pre-authorized on the
        tenant's on-chain signer allowlist. Once signature count reaches
        `quorum_required` the policy transitions `pending_signatures` →
        `active`; below quorum the signatures are recorded but the policy
        stays `pending_signatures` (still 200, `activated: false`).
      operationId: signPolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_id, signatures]
              properties:
                policy_id: { type: string }
                signatures:
                  type: array
                  items:
                    type: object
                    required: [address, signature]
                    properties:
                      address: { type: string, description: Signer address (0x-prefixed) }
                      signature: { type: string, description: EIP-712 signature (0x-prefixed) }
      responses:
        '200':
          description: Signature recorded; policy activated if quorum was reached
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy: { $ref: '#/components/schemas/Policy' }
                  activated: { type: boolean }
        '400':
          description: '`policy_id` and `signatures[]` are required. Error code `policy_signature_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            A signature did not verify, is a duplicate signer, or the
            signer is not an authorized tenant signer. Error code
            `policy_signature_invalid`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No such policy. Error code `policy_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Policy is not in `pending_signatures` state. Error code `policy_quorum_not_met`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /policy/{tenant_id}/evaluate:
    post:
      tags: [Policy]
      summary: Evaluate a proposed action against active policy
      description: |
        Requires `policy:read` (despite being a POST — evaluation is a
        read against the active policy, it writes nothing) and matching
        path/token tenant.
      operationId: evaluatePolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { $ref: '#/components/schemas/ProposedAction' }
      responses:
        '200':
          description: Decision and trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDecision'

        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No active policy for this tenant. Error code `policy_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /policy/{tenant_id}/simulate:
    post:
      tags: [Policy]
      summary: Replay an action against a historical policy version
      description: Requires `policy:read` and matching path/token tenant.
      operationId: simulatePolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, version]
              properties:
                action: { $ref: '#/components/schemas/ProposedAction' }
                version: { type: integer }
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDecision'

        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No such policy version. Error code `policy_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /policy/{tenant_id}/lint:
    post:
      tags: [Policy]
      summary: Static-analyze a candidate policy before signing (H-18)
      description: Requires `policy:read` and matching path/token tenant.
      operationId: lintPolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_content]
              properties:
                policy_content: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Lint findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  errors: { type: integer }
                  warnings: { type: integer }
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        code: { type: string }
                        severity: { type: string, enum: [ERROR, WARN] }
                        rule_id: { type: [string, "null"] }
                        message: { type: string }

        '400':
          description: '`policy_content` must be `{ version, rules[] }`. Error code `policy_rule_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /policy/{tenant_id}/diff:
    post:
      tags: [Policy]
      summary: Semantic diff between two policy versions (H-18)
      description: Requires `policy:read` and matching path/token tenant.
      operationId: diffPolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_version, to_version]
              properties:
                from_version: { type: integer }
                to_version: { type: integer }
      responses:
        '200':
          description: Rule-level diff
          content:
            application/json:
              schema:
                type: object
                properties:
                  from_version: { type: integer }
                  to_version: { type: integer }
                  added: { type: array, items: { type: object } }
                  removed: { type: array, items: { type: object } }
                  modified: { type: array, items: { type: object } }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: One or both versions not found. Error code `policy_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /policy/{tenant_id}/simulate-historical:
    post:
      tags: [Policy]
      summary: Replay the period's actions against a candidate policy (H-18)
      description: Requires `policy:read` and matching path/token tenant.
      operationId: simulateHistoricalPolicy
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policy_content, period_start, period_end]
              properties:
                policy_content: { type: object, additionalProperties: true }
                period_start: { type: string }
                period_end: { type: string }
      responses:
        '200':
          description: Simulation result + diff vs active
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  would_allow: { type: integer }
                  would_confirm: { type: integer }
                  would_reject: { type: integer }
                  diff_vs_active:
                    type: object
                    required: [newly_allowed, newly_rejected, changed_other, unchanged]
                    description: Empty buckets when the tenant has no active policy to diff against.
                    properties:
                      newly_allowed: { type: array, items: { type: string } }
                      newly_rejected: { type: array, items: { type: string } }
                      changed_other:
                        type: array
                        items: { type: string }
                        description: Outcome changed but not into allow/reject (e.g. allow to confirm)
                      unchanged: { type: integer }
        '400':
          description: '`period_start`/`period_end` must be ISO dates, or `policy_content` must be `{ version, rules[] }`. Error code `request_body_invalid` or `policy_rule_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Path `tenant_id` does not match the authenticated tenant. Error code `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # LAYER 5: AGENT (action orchestration; legacy /execution/* paths retained)
  #
  # New integrations should target /agents/* and /payment-intents/*.
  # The /execution/* paths below are equivalent (alias routing in the API
  # gateway) and remain shipped during the v0.3 transition. They carry a
  # `Deprecation` response header. Tag: Execution (deprecated).
  #############################################################################

  /agents:
    get:
      tags: [Agent]
      summary: List agents available to the tenant (internal-agent catalog)
      operationId: listAgents
      description: |
        Requires `execution:read`. Returns the first-party agent catalog
        (capability definitions). Internal and external agents share
        these routes — kind/provenance is a metadata field, not a
        separate path.
      parameters:
        - name: kind
          in: query
          description: Filter by provenance (e.g. internal/external).
          schema: { type: string }
        - name: capability
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string, enum: [business, consumer, agnostic] }
        - name: state
          in: query
          schema: { type: string, enum: [enabled, disabled] }
      responses:
        '200':
          description: Agent catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        agent_key: { type: string }
                        provenance: { type: string }
                        category: { type: string }
                        capabilities: { type: array, items: { type: string } }
                        enabled_by_default: { type: boolean }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/{agent_id}:
    get:
      tags: [Agent]
      summary: Agent detail (catalog definition + on-chain registration)
      description: Requires `execution:read`.
      operationId: getAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Agent definition and registration record
          content:
            application/json:
              schema:
                type: object
                properties:
                  definition: { type: object }
                  registration: { type: [object, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No such agent in the catalog. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /agents/{agent_id}/propose:
    post:
      tags: [Agent]
      summary: (Deprecated) Agent proposes a non-financial action
      operationId: proposeAgentAction
      deprecated: true
      description: |
        Not implemented. The proposal path is POST /agents/run (route → resolve →
        persist run → propose safely behind the §6 gate); financial actions go
        through POST /actions. This operation is retained only for back-compat
        documentation and returns 404.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: object }
      responses:
        '404':
          description: Always returned. This operation is not implemented.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /agents/{agent_id}/actions:
    get:
      tags: [Agent]
      summary: Recent actions/proposals for an agent
      description: Requires `execution:read`. Implemented in the PaymentIntent routes module (`services/execution`), not agent-router.
      operationId: listAgentActions
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Action list
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      type: object
                      properties:
                        proposal_id: { type: string }
                        payment_intent_id: { type: [string, "null"] }
                        status: { type: string }
                        created_at: { type: string, format: date-time }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/register:
    post:
      tags: [Agent]
      summary: Register an external agent
      operationId: registerAgent
      deprecated: true
      description: |
        Not yet implemented under /agents/*. Registration currently goes through
        the still-live legacy POST /execution/agents/register, which persists the
        agent in `pending_onchain` until the BrainMCPAgentRegistry tx confirms.
        This path is reserved for the v0.3 migration and is documented here for
        forward reference only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, role, display_name]
              properties:
                agent_id: { type: string }
                role: { type: string }
                display_name: { type: string }
                scope_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
                onchain_address: { type: string, pattern: '^0x[a-fA-F0-9]{40}$' }
                registered_tx: { type: string }
      responses:
        '201':
          description: Agent registered (pending_onchain)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/mcp:
    post:
      tags: [Agent, MCP]
      summary: MCP JSON-RPC entry for external agents
      description: |
        Single-shot HTTP transport for the Brain MCP (Model Context
        Protocol) surface. The request body is a JSON-RPC 2.0 envelope;
        the response is a JSON-RPC 2.0 envelope (always HTTP 200 unless
        the transport itself fails — application-level errors are
        carried inside the `error` field).

        Authentication: standard Brain JWT bearer with
        `principal_type=agent`. Before any method is dispatched the MCP
        server verifies (a) the agent record is `active`, (b) the JWT's
        `scope_hash` matches the on-chain hash registered in
        `BrainMCPAgentRegistry`, and (c) tenant equality. These
        pre-dispatch checks fail with an HTTP 401/403 Brain error
        envelope — NOT a JSON-RPC response. The JSON-RPC `McpErrorCode`
        range (-32001..-32005) is reserved for failures raised *after*
        authentication, inside method dispatch — chiefly per-tool scope
        checks (-32002) and §6 gate failures (-32004).

        Supported methods (v0.3):
          * `initialize`, `ping`
          * `tools/list`, `tools/call` — 12 tools across ledger, wiki,
            raw evidence, payment intents (propose/cancel/list), and
            agent action proposals
          * `resources/list`, `resources/read` — 7 resource templates
            (ledger accounts/transactions/obligations/payment-intents,
            wiki pages, payments action_types catalog, action proofs)
          * `prompts/list`, `prompts/get` — 5 canned prompts

        Tools enforce per-call scopes (e.g. `ledger:read`,
        `payment_intent:propose`). `tools/list` returns the full
        registry regardless of scope; `tools/call` is the gate.
        See `docs/mcp-architecture.md` for the full surface.
      operationId: agentMcpEntry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonRpcRequest' }
      responses:
        '200':
          description: |
            JSON-RPC envelope. On success, `result` carries the method
            result. On failure, `error.code` is one of the standard
            JSON-RPC codes (-32600..-32603) or a Brain-specific MCP
            code (-32001..-32005).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JsonRpcResponse' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/route:
    post:
      tags: [Agent]
      summary: Routing decision only (no run)
      description: |
        Requires `execution:read`. Returns the selected agent + scoring
        reason. Advisory; the selected agent still proposes through the
        gated path.
      operationId: routeAgent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentRouteRequest' }
      responses:
        '200':
          description: Routing decision
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingDecision' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /agents/run:
    post:
      tags: [Agent]
      summary: Route, resolve action, persist a run, and propose (shadow-aware)
      description: |
        Requires `payment_intent:propose`. Routes an event/intent to an
        agent, resolves the action within it, evaluates the §6 gate in
        dry-run, persists an `agent_runs` row, and proposes through the
        existing path. A financial proposal from a shadowed
        (un-promoted) agent terminates as `shadow_completed` and moves no
        money.
      operationId: runAgent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentRouteRequest' }
      responses:
        '200':
          description: Run result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentRunResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Proposal-layer idempotency collision (`agent_proposal_duplicate`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /agents/events:
    post:
      tags: [Agent]
      summary: Enqueue an event-driven route/run job
      description: Requires `payment_intent:propose`.
      operationId: enqueueAgentEvent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentRouteRequest' }
      responses:
        '202':
          description: Job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  status: { type: string, enum: [queued] }
        '400': { $ref: '#/components/responses/BadRequest' }

  /agents/runs:
    get:
      tags: [Agent]
      summary: List agent runs
      description: Requires `execution:read`.
      operationId: listAgentRuns
      parameters:
        - name: agent_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/AgentRunStatus' }
        - name: category
          in: query
          schema: { type: string, enum: [business, consumer] }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/AgentRun' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/runs/{run_id}:
    get:
      tags: [Agent]
      summary: Agent run detail
      description: Requires `execution:read`.
      operationId: getAgentRun
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Run summary (H-25)
          content:
            application/json:
              schema:
                type: object
                description: AgentRunSummary — see schemas/agent-run.schema.json
                properties:
                  run_id: { type: string }
                  tenant_id: { type: string }
                  agent_id: { type: string }
                  agent_key: { type: string }
                  status:
                    type: string
                    enum: [completed, failed, shadow_completed, rejected]
                  trigger: { type: object }
                  resolved_action: { type: object }
                  evidence_count: { type: integer }
                  confidence: { type: number }
                  evidence_score: { type: number }
                  risk_level: { type: string, enum: [low, medium, high, critical] }
                  outcome: { type: object }
                  started_at: { type: string }
                  completed_at: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/runs/{run_id}/why:
    get:
      tags: [Agent]
      summary: Why this agent was selected for the run (H-25)
      description: Requires `execution:read`. Which agents were candidates, why this one was selected (router multi-factor reason — score, evidence completeness, reputation, cost), and the runtime behavior hash.
      operationId: getAgentRunWhy
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Routing rationale
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string }
                  selected_agent_id: { type: [string, "null"] }
                  candidate_agent_ids: { type: array, items: { type: string } }
                  reason: { type: object }
                  behavior_hash: { type: [string, "null"] }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/runs/{run_id}/evidence:
    get:
      tags: [Agent]
      summary: Evidence chain the agent consumed for the run (H-25)
      description: Requires `execution:read`.
      operationId: getAgentRunEvidence
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Evidence chain
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string }
                  evidence: { type: array, items: { type: object } }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/runs/{run_id}/gate-trace:
    get:
      tags: [Agent]
      summary: The §6 gate check trace if a gate ran during the run (H-25)
      description: Requires `execution:read`.
      operationId: getAgentRunGateTrace
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Gate trace
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string }
                  payment_intent_id: { type: [string, "null"] }
                  gate_checks: { type: array, items: { type: object } }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/runs/{run_id}/proof:
    get:
      tags: [Agent]
      summary: Proof for the action the run produced (H-25 → H-07)
      description: Requires `execution:read`. Proxies the Proof API for the run's PaymentIntent. 404 if the run produced no on-ledger action.
      operationId: getAgentRunProof
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The assembled proof (see GET /proof/{action_id})
          content:
            application/json:
              schema: { type: object }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/routing-decisions/{id}:
    get:
      tags: [Agent]
      summary: Routing decision detail
      description: Requires `execution:read`.
      operationId: getRoutingDecision
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: expand
          in: query
          description: Comma-separated expansions. `agent` includes the stored agent provenance block.
          schema:
            type: string
            enum: [agent]
      responses:
        '200':
          description: Routing decision record
          content:
            application/json:
              schema: { type: object }
        '404': { $ref: '#/components/responses/NotFound' }

  /agents/{agent_id}/halt:
    post:
      tags: [Agent]
      summary: Halt an agent — pause its in-flight intents and quarantine it
      description: |
        Requires `payment_intent:approve` (not an execution-admin scope —
        halt authority piggybacks on approval authority). Tenant-root
        kill-switch (1b.3). Pauses all in-flight PaymentIntents from the
        agent and flips its state to `quarantined`.
      operationId: haltAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Halt result
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id: { type: string }
                  paused: { type: array, items: { type: string } }
                  quarantined: { type: boolean }

        '400': { $ref: '#/components/responses/BadRequest' }
  /agents/{agent_id}/contribution-hold/release:
    post:
      tags: [Agent]
      summary: Release an agent's contribution hold
      description: |
        Requires `payment_intent:approve` (same scope as halt). Clears
        the contribution hold so subsequent agent contributions extract
        normally again. Idempotent (config `idempotent: true`). Does not
        un-pause PaymentIntents paused by a prior halt.
      operationId: releaseContributionHold
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Contribution hold released
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id: { type: string }
                  contribution_hold_released: { type: boolean, enum: [true] }
        '404':
          description: No such agent, or the agent had no contribution hold to release. Error code `execution_agent_not_registered`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /agents/halt-category:
    post:
      tags: [Agent]
      summary: Emergency-stop every agent in a category
      description: Requires `payment_intent:approve`. Break-glass + tenant-root. Halts all agents of the given category.
      operationId: haltCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category: { type: string, enum: [business, consumer, agnostic] }
      responses:
        '200':
          description: Per-agent halt results
          content:
            application/json:
              schema:
                type: object
                properties:
                  category: { type: string }
                  halted:
                    type: array
                    items:
                      type: object
                      properties:
                        agent_id: { type: string }
                        paused: { type: array, items: { type: string } }
                        quarantined: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }

  /proposals:
    get:
      tags: [Proposals]
      summary: List typed agent-output proposals
      description: |
        Requires `execution:read`. Cursor-paginated, tenant-scoped read model
        over agent-created PaymentIntents and non-financial agent proposals.
        Evidence refs are returned as typed domain refs. `resolvable=true`
        means the kind has a resolver in `POST /v1/evidence/resolve`.
        Existence is checked only by the resolver endpoint, which returns
        `not_found=true` for absent or cross-tenant records. `brain://`
        placeholders are never emitted.
      operationId: listProposals
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/ProposalType' }
        - name: status
          in: query
          schema: { type: string }
        - name: risk_band
          in: query
          schema: { $ref: '#/components/schemas/ProposalRiskBand' }
        - name: min_confidence
          in: query
          schema: { type: number, minimum: 0, maximum: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Cursor page of typed agent-output proposals
          content:
            application/json:
              schema:
                type: object
                required: [proposals, next_cursor]
                properties:
                  proposals:
                    type: array
                    items: { $ref: '#/components/schemas/AgentOutputProposal' }
                  next_cursor: { type: [string, "null"] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /evidence/resolve:
    post:
      tags: [Evidence]
      summary: Resolve proposal evidence refs
      description: |
        Requires `execution:read`. Batch-resolves proposal evidence refs into
        tenant-scoped display summaries and canonical deep links. Supported in
        this release: counterparty, transaction, obligation, account, invoice,
        and wiki_entity. Unsupported kinds return `resolvable=false` with
        `reason=unsupported_kind`. A supported kind whose record is absent for
        this tenant returns `resolvable=true`, `not_found=true`, `summary=null`,
        and `deep_link=null`.
      operationId: resolveEvidenceRefs
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EvidenceResolveRequest' }
      responses:
        '200':
          description: Evidence resolution results, one per input ref
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvidenceResolveResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /proposals/{id}:
    get:
      tags: [Proposals]
      summary: Read a typed agent-output proposal
      description: |
        Requires `execution:read`. Reads either a money-path PaymentIntent
        proposal (`pi_...`) or a non-financial agent proposal (`prop_...`) from
        the caller's tenant only.
      operationId: getProposal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Typed proposal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentOutputProposal' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: No proposal exists for this tenant. Error code `execution_proposal_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /proposals/{id}/decide:
    post:
      tags: [Proposals]
      summary: Decide a proposal
      description: |
        Lets a member-resolvable human decide a money or non-money proposal.
        Body actor fields are ignored. Session identity is resolved only from
        authenticated server context. Agent principals are propose-only and
        receive `403 actor_unresolved`.

        For money-path proposals, `approve` and `reject` delegate to the
        PaymentIntent approval lifecycle so the full member authority chain and
        human-approval floors run. For non-money proposals, `acknowledge`
        terminally records a human saw a `notify_only` proposal, while `undo`
        reverses a reversible not-yet-executed agent decision. Every new
        decision emits an immutable `proposal.decided` audit event. A repeated
        already-terminal decision is idempotent and does not re-audit.
      operationId: decideProposal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { $ref: '#/components/schemas/ProposalDecision' }
      responses:
        '200':
          description: Decision recorded or idempotently returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProposalDecisionResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: No proposal exists for this tenant. Error code `execution_proposal_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /payment-intents:
    post:
      tags: [PaymentIntent]
      summary: Create a PaymentIntent (proposed)
      description: 'Requires `payment_intent:propose`. Idempotent (config `idempotent: true`).'
      operationId: createPaymentIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: FullPaymentIntent
                  type: object
                  required: [action_type, source_account_id, destination_counterparty_id, amount, currency]
                  properties:
                    action_type:
                      type: string
                      description: >-
                        Settlement rail for the intent. `x402_settle` (USDC on
                        Base via the x402 rail) and `escrow_release` (BrainEscrow
                        lock release, RFC 0001 §7.6) are gated but not yet
                        executable (shadow-first).
                      enum: [ach_outbound, ach_inbound, wire, onchain_transfer, erp_writeback, card_payment, x402_settle, escrow_release]
                    source_account_id: { type: string }
                    destination_counterparty_id: { type: string }
                    amount: { type: string, pattern: '^\d+(\.\d+)?$' }
                    # ISO-4217 (3-letter) for fiat rails; USDC for x402_settle (D-4, RFC 0001 §7.1).
                    currency: { type: string, pattern: '^[A-Z]{3}$|^USDC$' }
                    obligation_id: { type: string }
                    invoice_id: { type: string }
                    agent_id: { type: string }
                    evidence_ids:
                      type: array
                      items: { type: string }
                    pay_to:
                      type: string
                      pattern: '^0x[0-9a-fA-F]{40}$'
                      description: >-
                        x402 settlement recipient on-chain address. Required when
                        action_type=x402_settle; ignored otherwise (RFC 0001 §6.1).
                    escrow_id:
                      type: string
                      pattern: '^0x[0-9a-fA-F]{64}$'
                      description: >-
                        On-chain BrainEscrow id. Required when
                        action_type=escrow_release; ignored otherwise (RFC 0001 §7.6).
                    job_terms_hash:
                      type: string
                      pattern: '^0x[0-9a-fA-F]{64}$'
                      description: >-
                        keccak256 commitment of the escrow job terms. Required when
                        action_type=escrow_release; ignored otherwise (RFC 0001 §7.6).
                - title: PayInvoiceShortcut
                  type: object
                  description: >
                    Invoice shortcut (P0.5). Resolves amount, currency, counterparty,
                    source account, and evidence from the invoice. Fails closed with an
                    invoice_shortcut_* error if any input is unresolved.
                  required: [type, invoice_id]
                  properties:
                    type: { type: string, enum: [pay_invoice] }
                    invoice_id: { type: string }
                    agent_id: { type: string }
      responses:
        '201':
          description: PaymentIntent created with PolicyDecision attached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Invoice not found / not accessible (invoice shortcut, fails closed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Invoice already paid or duplicate (invoice shortcut, fails closed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /payment-intents/{id}:
    get:
      tags: [PaymentIntent]
      summary: PaymentIntent detail with PolicyDecision and audit trail
      description: Requires `execution:read`.
      operationId: getPaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PaymentIntent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }
        '404':
          description: No such PaymentIntent. Error code `payment_intent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /payment-intents/{id}/approve:
    post:
      tags: [PaymentIntent]
      summary: Sign approval on a confirm-mode PaymentIntent
      description: |
        Requires `payment_intent:approve`. The actor resolves through
        `ActorResolver` to a tenant member (session actors require
        `principal_type=user`) and must pass, in order: active tenant
        member, admin or approver role, authorized approval domain,
        per-item limit, actor is not the payee, and (when the policy
        decision or the member's own dual-control threshold requires it) a
        distinct second approval. When a second, distinct approval is
        still required the PaymentIntent moves to
        `awaiting_second_approval` instead of `approved`; the same member
        approving twice is rejected with `second_approval_required`.
      operationId: approvePaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated PaymentIntent. Status is `approved` if this was the final required approval, or `awaiting_second_approval` if a distinct second approval is still required.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }

        '409':
          description: The PaymentIntent is not in `pending_approval` or `awaiting_second_approval` state. Error code `payment_intent_invalid_state`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            The approval authority gate rejected the actor. Error code
            `payment_intent_approval_invalid`; `details.reason` is one of:
            `actor_unresolved` (no resolvable active member for the
            calling principal), `actor_inactive`, `domain_not_authorized`
            (missing admin/approver role or the member's approval domains
            do not cover this action), `actor_limit_exceeded` (amount
            exceeds the member's per-item limit), `self_approval_blocked`
            (the member is the payee, including an employee payee with an
            unresolved email, `details.payee_unresolved=true`), or
            `second_approval_required` (this member already signed and a
            distinct second approver is still required).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /payment-intents/{id}/reject:
    post:
      tags: [PaymentIntent]
      summary: Reject a PaymentIntent
      description: Requires `payment_intent:approve`.
      operationId: rejectPaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Rejected PaymentIntent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }

        '409':
          description: The PaymentIntent is not in a rejectable state. Error code `payment_intent_invalid_state`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /payment-intents/{id}/execute:
    post:
      tags: [PaymentIntent]
      summary: Execute an approved PaymentIntent through its rail
      description: |
        Requires `payment_intent:execute`. Runs the deterministic 13-step pre-execution gate (§6 of Engineering
        Standards), then durably hands the action to the execution outbox
        (H-04). On success the intent transitions approved → dispatching and a
        `pending` outbox row is enqueued atomically; the outbox worker then
        dispatches the rail and settles the intent asynchronously. Returns 202
        with `status: dispatching` and the `outbox_id`; `execution_id` is null
        until the worker dispatches. Returns 409 with `payment_intent_gate_failed`
        if any gate check fails, with details listing the failing check index.
      operationId: executePaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Gate passed; action enqueued to the durable outbox
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_intent_id: { type: string }
                  outbox_id: { type: string }
                  execution_id: { type: [string, "null"] }
                  rail: { type: string }
                  status: { type: string, enum: [dispatching, dispatched, in_flight] }
        '409':
          description: Gate failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /payment-intents/{id}/pause:
    post:
      tags: [PaymentIntent]
      summary: Pause an approved PaymentIntent (kill-switch)
      description: Requires `payment_intent:approve` (an approver can hold/release; tenant-root is the operational owner). Holds an `approved` intent without a terminal transition (1b.3). approved → paused.
      operationId: pausePaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Paused PaymentIntent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }
        '409':
          description: Not in a pausable state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /payment-intents/{id}/resume:
    post:
      tags: [PaymentIntent]
      summary: Resume a paused PaymentIntent
      description: Requires `payment_intent:approve`. Re-runs the live §6 gate before re-entering `approved` (defends against Ledger state drift while paused). paused → approved.
      operationId: resumePaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resumed PaymentIntent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntent' }
        '409':
          description: Resume gate failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /payment-intents/{id}/replay-investigation:
    get:
      tags: [PaymentIntent]
      summary: Typed forensic record for a PaymentIntent
      description: |
        Requires `execution:read`. Returns the intent, its executions (each with its typed rail receipt),
        and the linking ids (policy_decision_id, evidence_ids). The policy
        decision, reservation, and audit chain are referenced by id and joined
        via their owning service APIs (2.4).
      operationId: replayInvestigation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Forensic bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_intent: { $ref: '#/components/schemas/PaymentIntent' }
                  executions:
                    type: array
                    items: { type: object }
                  policy_decision_id: { type: [string, "null"] }
                  evidence_ids: { type: array, items: { type: string } }
        '404': { $ref: '#/components/responses/NotFound' }

  #############################################################################
  # MEMBERS — tenant approval authority model
  #############################################################################

  /members:
    get:
      tags: [Members]
      summary: List tenant members
      description: |
        Requires `execution:read` and a resolvable active member as the
        calling actor (session actor resolution requires
        `principal_type=user`; agent and machine principals are not
        member-resolvable and receive 403). Cursor pagination is
        keyset-based and opaque.
      operationId: listMembers
      parameters:
        - name: role
          in: query
          schema: { type: string, enum: [admin, approver, viewer] }
        - name: domain
          in: query
          schema: { type: string, enum: [ap, ar, treasury, payroll, reconciliation] }
        - name: limit
          in: query
          schema: { type: integer, default: 500, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items: { $ref: '#/components/schemas/Member' }
                  next_cursor: { type: [string, "null"] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Caller is not a resolvable active member. Error code `payment_intent_approval_invalid`, `details.reason=actor_unresolved`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      tags: [Members]
      summary: Create a member
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. When `invite: true`, the member is created with
        `status: invited` (not immediately active) and a one-time invite
        token is returned in the response — it must be exchanged via
        `POST /invites/consume`. Omitting `invite` (or setting it false)
        creates an immediately `active` member with no invite step.
      operationId: createMember
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemberCreateRequest' }
      responses:
        '201':
          description: Member created
          content:
            application/json:
              schema:
                type: object
                required: [member, audit_id]
                properties:
                  member: { $ref: '#/components/schemas/Member' }
                  audit_id: { type: string }
                  invite_token:
                    type: string
                    description: 'Present only when the request set `invite: true`. Shown once; not retrievable again — reissue via POST /members/{id}/invites if lost.'
                  invite_expires_in_hours:
                    type: integer
                    enum: [72]
                    description: 'Present only when the request set `invite: true`.'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Caller is not a resolvable active member, or is not an admin member. Error code `payment_intent_approval_invalid` (`details.reason=actor_unresolved`) or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /members/{id}:
    get:
      tags: [Members]
      summary: Get a member
      description: Requires `execution:read` and a resolvable active member as the calling actor.
      operationId: getMember
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Member
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Member' }
        '403':
          description: Caller is not a resolvable active member. Error code `payment_intent_approval_invalid`, `details.reason=actor_unresolved`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      tags: [Members]
      summary: Update a member
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. Only fields present in the body are changed.
        Setting `status` (`invited`|`active`|`deactivated`) also derives
        `active` (true only for `active`); setting `active` also derives
        `status` (`active` or `deactivated`) — the two are kept in sync
        regardless of which one the caller sends. Demoting the last
        active admin away from `role=admin`, or setting `active=false` /
        `status=deactivated` / `status=invited` on the last active admin,
        is rejected.
      operationId: updateMember
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemberUpdateRequest' }
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member: { $ref: '#/components/schemas/Member' }
                  audit_id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: |
            Caller is not a resolvable active admin member, or the edit
            would demote or deactivate the last active admin. Error code
            `payment_intent_approval_invalid` (`details.reason=actor_unresolved`
            or `details.reason=last_admin_protected`), or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Members]
      summary: Deactivate a member
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. Members are deactivated, never hard-deleted
        (`status: deactivated`, `active: false`). The last active admin
        in a tenant cannot be deactivated.
      operationId: deactivateMember
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Member deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member: { $ref: '#/components/schemas/Member' }
                  audit_id: { type: string }
        '403':
          description: |
            Caller is not a resolvable active admin member, or this member
            is the last active admin. Error code `payment_intent_approval_invalid`
            (`details.reason=actor_unresolved` or `details.reason=last_admin_protected`),
            or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /members/{id}/invites:
    post:
      tags: [Members]
      summary: (Re)issue an invite token for a member
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. Issuing a new invite revokes any outstanding,
        unconsumed invite for this member first — only one live invite
        token exists per member at a time. Does not require the member
        to currently be `status: invited` (re-inviting an active member
        is allowed and does not change their status). Invite tokens
        expire after 72 hours and are consumed via `POST /invites/consume`.
      operationId: createMemberInvite
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invite (re)issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite_token: { type: string, description: Shown once. }
                  expires_at: { type: string, format: date-time }
        '403':
          description: Caller is not a resolvable active admin member. Error code `payment_intent_approval_invalid` or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Members]
      summary: Revoke a member's outstanding invite
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. Revokes any outstanding, unconsumed invite for
        this member. Does not change the member's `status`.
      operationId: revokeMemberInvite
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invite revoked (or none was outstanding)
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: boolean, enum: [true] }
        '403':
          description: Caller is not a resolvable active admin member. Error code `payment_intent_approval_invalid` or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /members/{id}/identity-links:
    post:
      tags: [Members]
      summary: Link a surface identity to a member
      description: |
        Requires `execution:admin` and an active admin member as the
        calling actor. Links an external Slack, Teams, or email identity to
        a member so surface approvals (§ Surfaces) resolve to this member's
        approval authority.
      operationId: createMemberIdentityLink
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemberIdentityLinkRequest' }
      responses:
        '200':
          description: Identity link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Caller is not a resolvable active admin member. Error code `payment_intent_approval_invalid` or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [Members]
      summary: Remove a surface identity link from a member
      operationId: deleteMemberIdentityLink
      description: Requires `execution:admin` and an active admin member as the calling actor.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemberIdentityLinkRequest' }
      responses:
        '200':
          description: Identity link removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_id: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Caller is not a resolvable active admin member. Error code `payment_intent_approval_invalid` or `auth_scope_insufficient`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Member not found. Error code `agent_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # LAYER 5 (legacy): EXECUTION — deprecated, retained for v0.3 transition
  #############################################################################

  /execution/propose:
    post:
      tags: [Execution]
      summary: Agent proposes an action
      description: |
        Requires `execution:propose`. The agent submits an action. The server evaluates it against the
        active policy and returns a decision. If decision=allow, the action
        can be executed immediately via /execute. If decision=confirm, the
        action requires human approval first. If decision=reject, no
        further action is possible.
      operationId: proposeAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, action]
              properties:
                agent_id: { type: string }
                action: { $ref: '#/components/schemas/ProposedAction' }
                idempotency_key:
                  type: string
                  description: Client-supplied key for deduplication
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proposal'

        '400': { $ref: '#/components/responses/BadRequest' }
  /execution/execute:
    post:
      tags: [Execution]
      summary: 'DISABLED: legacy proposal execution (bypassed the §6 gate)'
      operationId: executeProposal
      deprecated: true
      description: >
        Requires `execution:write`. Disabled. This legacy v0.2 route dispatched a proposal through a payment
        rail with no §6 pre-execution gate — no policy decision, sanctions,
        balance, or amount-limit checks, and no audit before/after pair — which
        Engineering Standards §6 ("no execution path may bypass the gate") and
        §9.5 ("financial actions use PaymentIntent, not Proposal") forbid. It now
        always returns 422 `gate_no_policy_decision`. Execute money movement via
        `POST /actions/{action_id}/execute`, which runs the gate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposal_id]
              properties:
                proposal_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                dry_run: { type: boolean, default: false }
      responses:
        '422':
          description: >
            Route disabled. Money movement must go through the gated
            POST /actions/{action_id}/execute. Error code
            `gate_no_policy_decision`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /execution/{execution_id}:
    get:
      tags: [Execution]
      summary: Execution status and trace
      description: Requires `execution:read`.
      operationId: getExecution
      parameters:
        - name: execution_id
          in: path
          required: true
          schema: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Execution record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Execution'
        '404':
          description: No such execution. Error code `execution_proposal_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /execution/approve:
    post:
      tags: [Execution]
      summary: Human approval for a confirm-gated proposal
      description: |
        Requires `execution:write`. Legacy v0.2 approval: satisfied by
        approver-id signature presence, with no org-role membership model
        (that lives in the PaymentIntent / Members approval path — new
        integrations should approve via `/payment-intents/*`).
      operationId: approveProposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposal_id]
              properties:
                proposal_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                approver_notes: { type: string, description: Accepted but currently ignored by the implementation. }
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No such proposal. Error code `execution_proposal_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Proposal is not pending approval. Error code `execution_proposal_invalid_state`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /execution/escalate:
    post:
      tags: [Execution]
      summary: Agent escalates to human
      description: |
        Requires `execution:propose`. Only emits an `execution.escalate`
        audit event; does not itself change proposal state.
      operationId: escalateProposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposal_id]
              properties:
                proposal_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
                note: { type: string, maxLength: 200, description: 'Truncated to 200 characters. Field name is `note`, not `reason`.' }
      responses:
        '202':
          description: Escalation recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  escalated: { type: boolean, enum: [true] }
                  proposal_id: { type: string }

        '400': { $ref: '#/components/responses/BadRequest' }
  /execution/agents:
    get:
      tags: [Execution]
      summary: List configured agents for the current tenant
      description: Requires `execution:read`.
      operationId: listExecutionAgents
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items: { $ref: '#/components/schemas/Agent' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /execution/agents/register:
    post:
      tags: [Execution]
      summary: Register an external agent
      description: |
        Requires `execution:admin`. Registers a third-party agent for
        this tenant with `state: pending_onchain`. This route does not
        itself submit or confirm an on-chain transaction — `registered_tx`
        is accepted as caller-supplied evidence and stored as-is;
        `onchain_tx_hash` in the response comes from that same field, not
        from a server-side chain call.
      operationId: registerExternalAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, role, display_name]
              properties:
                agent_id: { type: string }
                role: { type: string }
                display_name: { type: string }
                scope_hash: { type: string, pattern: '^[0-9a-f]{64}$' }
                onchain_address:
                  type: string
                  pattern: '^0x[a-fA-F0-9]{40}$'
                  description: Ethereum address of the agent
                registered_tx: { type: string }
      responses:
        '201':
          description: Registered (pending_onchain)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /execution/agents/{agent_id}:
    get:
      tags: [Execution]
      summary: Get agent configuration and on-chain registration
      description: Requires `execution:read`.
      operationId: getExecutionAgent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Agent record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404':
          description: No such agent. Error code `execution_agent_not_registered`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /execution/mcp:
    post:
      tags: [Execution]
      summary: 'DEPRECATED: legacy MCP ping shim'
      operationId: executionMcpShim
      deprecated: true
      description: |
        Deprecated v0.2 back-compat shim, retained for the v0.3 transition
        window. Requires an agent principal. Only the `ping` JSON-RPC method
        is answered; every other method returns 501
        `execution_agent_not_registered` and points the caller at the real
        surface. Use POST /agents/mcp (services/mcp) instead, a JSON-RPC 2.0
        server with the full tool, resource, and prompt surface.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method: { type: string, example: ping }
                params: { type: object, additionalProperties: true }
      responses:
        '200':
          description: '`method: ping` only'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '501':
          description: Any method other than `ping`. Error code `execution_agent_not_registered`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # LAYER 6: AUDIT
  #############################################################################

  /audit/entity/{entityType}/{entityId}:
    get:
      tags: [Audit]
      summary: Every audit event touching a Ledger row
      description: Requires `audit:read`.
      operationId: getAuditEntityHistory
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum:
              - account
              - balance
              - transaction
              - counterparty
              - obligation
              - document
              - invoice
              - payment_intent
              - reconciliation_match
              - proposal
              - execution
        - name: entityId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Event history
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity_type: { type: string }
                  entity_id: { type: string }
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }

        '400': { $ref: '#/components/responses/BadRequest' }
  /proof/{action_id}:
    get:
      tags: [Audit]
      summary: Canonical, verifiable proof for an action (H-07)
      description: |
        Requires `audit:read`. The flagship trust artifact. Assembles a
        single, independently verifiable Proof for a PaymentIntent (or
        agent-action) from the §6 gate trace, the evidence chain, the
        policy decision, and the append-only, on-chain-anchored audit
        Merkle chain. Tenant-isolated: an action that does not exist for
        the caller's tenant returns 404 (existence is never leaked).
        `chain_anchor` is null until the containing batch is anchored
        on-chain.
      operationId: getProof
      parameters:
        - name: action_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The assembled proof
          content:
            application/json:
              schema:
                type: object
                properties:
                  action_id: { type: string }
                  tenant_id: { type: string }
                  agent_id: { type: string }
                  behavior_hash: { type: [string, "null"] }
                  outcome:
                    type: string
                    enum: [allowed, confirmed, rejected, executed, failed, shadow_completed]
                  policy_version: { type: string }
                  policy_hash: { type: string }
                  matched_rule_id: { type: [string, "null"] }
                  gate_checks: { type: array, items: { type: object } }
                  evidence: { type: array, items: { type: object } }
                  ledger_snapshot_hash: { type: string }
                  audit_events: { type: array, items: { type: object } }
                  merkle_root: { type: string }
                  merkle_proof: { type: array, items: { type: string } }
                  chain_anchor: { type: [object, "null"] }
                  rail_receipt: { type: [object, "null"] }
                  human_explanation: { type: string }
        '404':
          description: No proof for that action (or not visible to this tenant). Error code `proof_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /proof/{action_id}/view:
    get:
      tags: [Audit]
      summary: Human-readable proof viewer (P0.7)
      description: |
        Server-rendered HTML view of the same canonical Proof as
        GET /proof/{action_id} — the compliance-/investor-facing screen. No auth
        bypass: requires the same authenticated principal + audit:read scope and
        is tenant-isolated (unknown/cross-tenant id → 404, no existence leak).
      operationId: getProofView
      parameters:
        - name: action_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rendered proof page
          content:
            text/html:
              schema: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: No proof for that action (or not visible to this tenant)

  /webhooks/{endpoint_id}/dead-letters:
    get:
      tags: [Audit]
      summary: List undeliverable webhook events for an endpoint (H-20)
      description: |
        Requires `audit:read`. Outbound webhook deliveries that failed
        are durably recorded here instead of being lost. Each row tracks
        attempt_count and the last error; once attempt_count reaches 5
        the row is exhausted (replay no longer auto-retries it).
        Tenant-isolated.
      operationId: listWebhookDeadLetters
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Dead-letter list
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint_id: { type: string }
                  dead_letters:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        event_id: { type: string }
                        event_type: { type: string }
                        last_error: { type: [string, "null"] }
                        attempt_count: { type: integer }
                        created_at: { type: string }
                        last_attempt_at: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /webhooks/{endpoint_id}/replay:
    post:
      tags: [Audit]
      summary: Replay dead-lettered webhook events (H-20)
      description: |
        Requires `audit:write`. Re-delivers each dead-letter still under the attempt cap. A successful
        re-delivery clears the row; a failure bumps attempt_count. Idempotent
        (accepts Idempotency-Key). Tenant-isolated.
      operationId: replayWebhookDeadLetters
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Replay result
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint_id: { type: string }
                  attempted: { type: integer }
                  redelivered: { type: integer }
                  still_failing: { type: integer }
        '404': { $ref: '#/components/responses/NotFound' }

  #############################################################################
  # ADMIN: TENANT LIFECYCLE
  #############################################################################

  /tenants/{id}:
    delete:
      tags: [Admin]
      summary: Delete a tenant (GDPR right to erasure)
      description: |
        Self-only: requires `principal_type=user` and `principal.tenantId
        === id`. Any other principal type, or a mismatched tenant id, is
        rejected with `auth_tenant_mismatch`. Wipes every tenant-scoped row
        across Raw, Canonical, Ledger, Wiki, Policy, and Execution tables.
        The Merkle audit chain itself is preserved; the deletion is recorded
        as a `tenant.deleted` audit event so the erasure is itself
        verifiable. Blob artifacts referenced by deleted `raw_artifacts`
        rows are not deleted synchronously: a `tenant_blob_purge_jobs` row
        is enqueued for the privileged blob-purge worker to erase the
        underlying bytes out-of-band (RFC 0003), satisfying GDPR Article 17
        in full.
      operationId: deleteTenant
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Tenant deleted
          content:
            application/json:
              schema:
                type: object
                required: [tenantId, deletedRows, totalRows, blobArtifactCount, blobUrisPendingPurge, blobPurgeJobId]
                properties:
                  tenantId: { type: string }
                  deletedRows:
                    type: object
                    additionalProperties: { type: integer }
                    description: Row count deleted per table
                  totalRows: { type: integer }
                  blobArtifactCount:
                    type: integer
                    description: Count of raw_artifacts rows that referenced a blob
                  blobUrisPendingPurge:
                    type: array
                    items: { type: string }
                    description: Every blob_uri from the deleted raw_artifacts rows, pending out-of-band purge
                  blobPurgeJobId:
                    type: [string, "null"]
                    description: The enqueued tenant_blob_purge_jobs row id. Null when the tenant uploaded no blobs.
        '403':
          description: Caller is not a user principal, or principal.tenantId does not match the path id. Error code `auth_scope_insufficient` or `auth_tenant_mismatch`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tenants/{id}/export:
    post:
      tags: [Admin]
      summary: Enqueue a tenant data export (GDPR portability)
      description: |
        Self-only: requires `principal_type=user` and `principal.tenantId
        === id`, matching DELETE /tenants/{id}. Agent and API partner
        principals are rejected. Enqueues one async export job per tenant
        when no queued or running export already exists. The worker assembles
        a tenant-scoped NDJSON archive containing Ledger accounts,
        transactions, counterparties, obligations, invoices, Ledger document
        rows, Raw artifact metadata with blob URIs, members, sources without
        encrypted credentials, proposals, and audit events. Archives expire
        after the configured retention horizon and are purged.
      operationId: createTenantExport
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Existing queued or running export job returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantExportJob' }
        '202':
          description: Export job queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantExportJob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tenants/{id}/export/{job_id}:
    get:
      tags: [Admin]
      summary: Get tenant export job status
      description: |
        Self-only user-principal status lookup for a tenant export job.
        Returns status, byte size when available, expiry, and any terminal
        error. Does not return the sensitive blob URI.
      operationId: getTenantExport
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
        - name: job_id
          in: path
          required: true
          schema: { type: string, pattern: '^texp_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Export job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantExportJob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tenants/{id}/export/{job_id}/download:
    get:
      tags: [Admin]
      summary: Download a completed tenant export archive
      description: |
        Streams the completed NDJSON archive for the authenticated user's own
        tenant. The tenant id and job id are path parameters and are checked
        against the principal. No tenant id or data is accepted in query
        parameters. Returns 410 after the archive expires.
      operationId: downloadTenantExport
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
        - name: job_id
          in: path
          required: true
          schema: { type: string, pattern: '^texp_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Export archive
          content:
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: Export archive expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  #############################################################################
  # REFERENCE — public, tenant-agnostic data
  #############################################################################

  /reference/yield-venues:
    get:
      tags: [Reference]
      summary: Public DeFi yield-venue catalog
      description: |
        Public, always-on, rate-limited (60/min). The same catalog for
        every tenant; carries no truth or provenance coupling and is not
        Ledger data. Used by the Treasury demo scenario to split idle cash
        across venues subject to each venue's `cap_pct`.
      operationId: listYieldVenues
      security: [] # public
      responses:
        '200':
          description: Venue catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues:
                    type: array
                    items:
                      type: object
                      required: [id, name, apy, cap_pct, chain]
                      properties:
                        id: { type: string, description: Stable slug for referencing a venue }
                        name: { type: string }
                        apy: { type: number, description: 'Annual percentage yield, e.g. 4.2 = 4.2%' }
                        cap_pct: { type: number, description: 'Max share of deployable treasury allocatable to this venue, percent' }
                        chain: { type: string, enum: [base] }
                  chain: { type: string, enum: [base-sepolia] }
        '429': { $ref: '#/components/responses/RateLimited' }

  /audit/events:
    get:
      tags: [Audit]
      summary: Query audit events
      description: Requires `audit:read`.
      operationId: queryAuditEvents
      parameters:
        - name: layer
          in: query
          schema:
            type: string
            enum: [raw, ledger, wiki, policy, agent, execution, audit]
        - name: actor
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  next_cursor: { type: [string, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /audit/event/{event_id}:
    get:
      tags: [Audit]
      summary: Get a single event with inclusion proof
      description: Requires `audit:read`.
      operationId: getAuditEvent
      parameters:
        - name: event_id
          in: path
          required: true
          schema: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
      responses:
        '200':
          description: Event and proof
          content:
            application/json:
              schema:
                type: object
                properties:
                  event: { $ref: '#/components/schemas/AuditEvent' }
                  inclusion_proof:
                    type: object
                    properties:
                      merkle_root: { type: string }
                      merkle_proof:
                        type: array
                        items: { type: string }
                      anchor_tx_hash: { type: string }
                      anchor_block: { type: integer }

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No such event. Error code `audit_event_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /audit/export:
    post:
      tags: [Audit]
      summary: Request an audit export (async)
      description: |
        Requires `audit:read` (not `audit:write` — exporting is a read
        operation on the log). Only `format` is required; `since`/`until`
        are optional (unbounded if omitted). `layers` is not implemented
        and is ignored if sent — this endpoint currently enqueues the job
        only, the BullMQ worker that materializes the export file is a
        separate follow-up.
      operationId: exportAudit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format: { type: string, enum: [jsonl, csv] }
                since: { type: string, format: date-time }
                until: { type: string, format: date-time }
      responses:
        '202':
          description: Export job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, description: 'Not a Brain ID — currently `exp_<timestamp36>`' }
                  format: { type: string, enum: [jsonl, csv] }
                  status: { type: string, enum: [enqueued] }

        '400':
          description: '`format` must be `jsonl` or `csv`. Error code `request_body_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /audit/anchor/latest:
    get:
      tags: [Audit]
      summary: Get the latest on-chain anchor for the current tenant
      description: Requires `audit:read`.
      operationId: getLatestAnchor
      responses:
        '200':
          description: Anchor record
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  merkle_root: { type: string }
                  event_count: { type: integer }
                  period_start: { type: string, format: date-time }
                  period_end: { type: string, format: date-time }
                  onchain_tx_hash: { type: [string, "null"] }
                  onchain_block_number: { type: [integer, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: No anchor published yet. Error code `audit_anchor_not_yet_published`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /audit/anchor/publish:
    post:
      tags: [Audit]
      summary: Publish an on-demand anchor for the last 24 hours of events
      description: |
        Requires `audit:admin`. Only registered when an on-chain
        broadcaster is configured for this deployment — if not
        configured, this path does not exist (404 route not found, not a
        Brain error envelope). Per-tenant 60-second cooldown between
        publishes.
      operationId: publishAnchor
      responses:
        '200':
          description: Anchor published
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  merkle_root: { type: string }
                  event_count: { type: integer }
                  tx_hash: { type: [string, "null"] }
                  basescan_url: { type: [string, "null"] }
        '404':
          description: No audit events in the last 24 hours. Error code `audit_no_events`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Per-tenant publish cooldown (60s) still active. Error code `rate_limited`, `details.retry_after_seconds`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /audit/webhooks/endpoints:
    post:
      tags: [Audit]
      summary: Register an outbound audit webhook endpoint
      description: |
        Requires `audit:write`. The signing secret is generated
        server-side and returned exactly once, in this response; it is
        never retrievable again (subsequent list calls return only a
        preview).
      operationId: createAuditWebhookEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri, description: Must start with https:// }
                enabled_events:
                  type: array
                  items: { type: string }
                  description: Subset of the forwarded event types. Omit for all forwarded events.
      responses:
        '201':
          description: Endpoint registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  url: { type: string }
                  enabled_events: { type: [array, "null"], items: { type: string } }
                  enabled: { type: boolean }
                  secret: { type: string, description: Shown only in this response }
                  created_at: { type: string, format: date-time }
        '400':
          description: '`url` must be an `https://` string, or `enabled_events` includes an unsupported type. Error code `request_body_invalid`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [Audit]
      summary: List outbound audit webhook endpoints
      description: Requires `audit:read`. Secrets are masked to an 8-character preview.
      operationId: listAuditWebhookEndpoints
      responses:
        '200':
          description: Endpoint list
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        url: { type: string }
                        enabled_events: { type: [array, "null"], items: { type: string } }
                        enabled: { type: boolean }
                        secret_preview: { type: string, description: First 8 characters followed by "..." }
                        created_at: { type: string, format: date-time }

  /audit/webhooks/endpoints/{id}:
    delete:
      tags: [Audit]
      summary: Remove an outbound audit webhook endpoint
      description: Requires `audit:write`.
      operationId: deleteAuditWebhookEndpoint
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Endpoint removed
        '404':
          description: No such endpoint. Error code `audit_event_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /audit/verify:
    post:
      tags: [Audit]
      summary: Verify an event's inclusion against a claimed Merkle root
      description: |
        Public (no auth required). Pure Merkle inclusion verifier — no DB
        access. Caller supplies an event hash, a Merkle proof, and a
        claimed root; the server verifies only that the proof is valid
        against that root. `onchain_block` is always `null`: this
        endpoint does not check the root's on-chain presence (that would
        need an RPC lookup, not implemented here) — a caller wanting full
        on-chain confirmation must independently check `merkle_root`
        against the anchor transaction.
      operationId: verifyInclusion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_hash, merkle_proof, merkle_root]
              properties:
                event_hash: { type: string }
                merkle_proof:
                  type: array
                  items: { type: string }
                merkle_root: { type: string }
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
                  onchain_block: { type: [integer, "null"] }

        '400': { $ref: '#/components/responses/BadRequest' }
  /canonical/obligations:
    get:
      tags: [Canonical]
      summary: List canonical AP/AR obligations as governed data products
      description: |
        Reads the canonical obligation domain (Phase 6 governed data products).
        Each obligation is returned with its provenance (how Brain knows it) and
        freshness (when it was last projected, by which projector). Read-only;
        requires the `canonical:read` scope.
      operationId: listCanonicalObligations
      parameters:
        - name: direction
          in: query
          schema: { type: string, enum: [payable, receivable] }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: Obligation data products
          content:
            application/json:
              schema:
                type: object
                required: [obligations]
                properties:
                  obligations:
                    type: array
                    items: { $ref: '#/components/schemas/CanonicalObligationProduct' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /canonical/obligations/{obligation_id}:
    get:
      tags: [Canonical]
      summary: Get one canonical obligation as a governed data product
      description: Requires `canonical:read`.
      operationId: getCanonicalObligation
      parameters:
        - name: obligation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Obligation data product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonicalObligationProduct' }
        '404':
          description: No such canonical obligation. Error code `obligation_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /canonical/gl-accounts:
    get:
      tags: [Canonical]
      summary: List canonical GL accounts (chart of accounts) as governed data products
      description: |
        Reads the canonical chart of accounts (Phase 6 governed data products).
        Each account is returned with its provenance and freshness. Read-only;
        requires the `canonical:read` scope.
      operationId: listCanonicalGlAccounts
      parameters:
        - name: classification
          in: query
          schema: { type: string, enum: [asset, liability, equity, revenue, expense, unknown] }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: GL account data products
          content:
            application/json:
              schema:
                type: object
                required: [gl_accounts]
                properties:
                  gl_accounts:
                    type: array
                    items: { $ref: '#/components/schemas/CanonicalGlAccountProduct' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /canonical/gl-accounts/{gl_account_id}:
    get:
      tags: [Canonical]
      summary: Get one canonical GL account as a governed data product
      description: Requires `canonical:read`.
      operationId: getCanonicalGlAccount
      parameters:
        - name: gl_account_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: GL account data product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonicalGlAccountProduct' }
        '404':
          description: No such canonical GL account. Error code `ledger_row_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /canonical/journal-entries:
    get:
      tags: [Canonical]
      summary: List canonical journal entries as governed data products
      description: |
        Reads the canonical double-entry journals (Phase 6 governed data
        products). Each entry carries its debit/credit lines, provenance, and
        freshness. Read-only; requires the `canonical:read` scope.
      operationId: listCanonicalJournalEntries
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: Journal entry data products
          content:
            application/json:
              schema:
                type: object
                required: [journal_entries]
                properties:
                  journal_entries:
                    type: array
                    items: { $ref: '#/components/schemas/CanonicalJournalEntryProduct' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /canonical/journal-entries/{journal_entry_id}:
    get:
      tags: [Canonical]
      summary: Get one canonical journal entry (with its lines) as a governed data product
      description: Requires `canonical:read`.
      operationId: getCanonicalJournalEntry
      parameters:
        - name: journal_entry_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Journal entry data product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonicalJournalEntryProduct' }
        '404':
          description: No such canonical journal entry. Error code `ledger_row_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token issued by Brain's auth service.
        Contains tenant_id and scopes. See Engineering Standards
        section 2 for the full auth model.

  parameters:
    RawId:
      name: raw_id
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
    EntityId:
      name: entity_id
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }

  responses:
    BadRequest:
      description: Request is malformed or missing required fields
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Authentication failed or missing
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not authorized for this operation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found or not accessible to this tenant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    PayloadTooLarge:
      description: Request body exceeds maximum size
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UnsupportedMediaType:
      description: Content-Type not supported for this operation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UnprocessableEntity:
      description: Request is well-formed but semantically invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    TenantExportJob:
      type: object
      required: [job_id, tenant_id, status, byte_size, expires_at, error, created_at, updated_at]
      properties:
        job_id:
          type: string
          pattern: '^texp_[0-9A-HJKMNP-TV-Z]{26}$'
        tenant_id:
          type: string
          pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$'
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        byte_size:
          type: [integer, "null"]
          minimum: 0
        expires_at:
          type: string
          format: date-time
        error:
          type: [object, "null"]
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ResolvedObligationView:
      type: object
      description: |
        One reconciled obligation fact. All observations retained; field-level
        authority; conflicts listed; duplicate candidates pending review (§13).
      required: [subject_obligation_id, observations, resolved, conflicts, matches]
      properties:
        subject_obligation_id: { type: string }
        observations:
          type: array
          items: { type: object, additionalProperties: true }
        resolved:
          type: object
          description: Field-level authority — which observation owns each field.
          additionalProperties: true
        conflicts:
          type: array
          description: Fields where observations disagree, with the competing values.
          items:
            type: object
            properties:
              field: { type: string }
              values: { type: array, items: { type: object, additionalProperties: true } }
        matches:
          type: array
          items:
            type: object
            properties:
              match_id: { type: string }
              status: { type: string }
              confidence_score: { type: number }
        pending_review:
          type: array
          description: duplicate_possible candidates awaiting user confirmation.
          items: { type: object, additionalProperties: true }

    ResolvedCounterpartyView:
      type: object
      description: |
        One reconciled organization. Linked observations unioned into facets;
        name variants listed; duplicate candidates pending review (§13).
      required: [subject_counterparty_id, observations, resolved, matches]
      properties:
        subject_counterparty_id: { type: string }
        observations:
          type: array
          items: { type: object, additionalProperties: true }
        resolved:
          type: object
          properties:
            name:
              type: object
              properties:
                value: { type: string }
                authority_counterparty_id: { type: string }
                authority_provenance: { type: string }
            types: { type: array, items: { type: string } }
            member_ids: { type: array, items: { type: string } }
        name_variants:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              counterparty_id: { type: string }
        matches:
          type: array
          items:
            type: object
            properties:
              match_id: { type: string }
              confidence_score: { type: number }
        pending_review:
          type: array
          items: { type: object, additionalProperties: true }

    ResolvedAccountView:
      type: object
      description: |
        One reconciled money pool. Balances are reported per observation (never
        adjudicated); account duplicates never auto-match, so member links are
        human-confirmed; candidates are listed pending review (§13).
      required: [subject_account_id, observations, resolved]
      properties:
        subject_account_id: { type: string }
        observations:
          type: array
          items: { type: object, additionalProperties: true }
        resolved:
          type: object
          properties:
            member_ids: { type: array, items: { type: string } }
        matches:
          type: array
          items:
            type: object
            properties:
              match_id: { type: string }
              confidence_score: { type: number }
        pending_review:
          type: array
          items: { type: object, additionalProperties: true }

    CanonicalGlAccountProduct:
      type: object
      description: |
        A canonical GL account (chart of accounts) as a governed data product:
        the record plus its provenance (the evidence behind it) and freshness.
      required: [domain, record, provenance, freshness]
      properties:
        domain: { type: string, enum: [accounting] }
        record:
          type: object
          required: [id, name, classification, source_system, source_natural_key]
          properties:
            id: { type: string }
            name: { type: string }
            classification:
              type: string
              enum: [asset, liability, equity, revenue, expense, unknown]
            account_number: { type: [string, "null"] }
            currency: { type: [string, "null"] }
            status: { type: [string, "null"] }
            source_system: { type: string }
            source_natural_key: { type: string }
            extensions: { type: object, additionalProperties: true }
        provenance:
          type: object
          required: [provenance, source_ids, evidence_ids]
          properties:
            provenance:
              type: string
              enum: [extracted, agent_contributed, customer_asserted, human_confirmed]
            confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
            source_ids: { type: array, items: { type: string } }
            evidence_ids: { type: array, items: { type: string } }
        freshness:
          type: object
          required: [schema_version, source_system, updated_at]
          properties:
            schema_version: { type: integer }
            source_system: { type: string }
            updated_at: { type: string, format: date-time }
            projected_at: { type: [string, "null"], format: date-time }
            projector: { type: [string, "null"] }

    CanonicalJournalEntryProduct:
      type: object
      description: |
        A canonical journal entry as a governed data product: the double-entry
        header + its debit/credit lines, plus provenance and freshness.
      required: [domain, record, provenance, freshness]
      properties:
        domain: { type: string, enum: [accounting] }
        record:
          type: object
          required: [id, source_system, source_natural_key, lines]
          properties:
            id: { type: string }
            posted_at: { type: [string, "null"], format: date-time }
            memo: { type: [string, "null"] }
            currency: { type: [string, "null"] }
            status: { type: [string, "null"] }
            source_system: { type: string }
            source_natural_key: { type: string }
            lines:
              type: array
              items:
                type: object
                properties:
                  line_number: { type: integer }
                  gl_account_id: { type: [string, "null"] }
                  gl_account_key: { type: [string, "null"] }
                  direction: { type: string, enum: [debit, credit] }
                  amount: { type: string }
                  currency: { type: [string, "null"] }
                  description: { type: [string, "null"] }
            extensions: { type: object, additionalProperties: true }
        provenance:
          type: object
          required: [provenance, source_ids, evidence_ids]
          properties:
            provenance:
              type: string
              enum: [extracted, agent_contributed, customer_asserted, human_confirmed]
            confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
            source_ids: { type: array, items: { type: string } }
            evidence_ids: { type: array, items: { type: string } }
        freshness:
          type: object
          required: [schema_version, source_system, updated_at]
          properties:
            schema_version: { type: integer }
            source_system: { type: string }
            updated_at: { type: string, format: date-time }
            projected_at: { type: [string, "null"], format: date-time }
            projector: { type: [string, "null"] }

    CanonicalObligationProduct:
      type: object
      description: |
        A canonical AP/AR obligation as a governed data product: the record plus
        its provenance (the evidence behind the value) and freshness.
      required: [domain, record, provenance, freshness]
      properties:
        domain: { type: string, enum: [ap_ar] }
        record:
          type: object
          required: [id, direction, type, amount, source_system, source_natural_key]
          properties:
            id: { type: string }
            direction: { type: string, enum: [payable, receivable] }
            type: { type: string }
            canonical_counterparty_id: { type: [string, "null"] }
            amount: { type: string }
            currency: { type: [string, "null"] }
            issue_date: { type: [string, "null"], format: date-time }
            due_date: { type: [string, "null"], format: date-time }
            status: { type: [string, "null"] }
            source_system: { type: string }
            source_natural_key: { type: string }
            extensions: { type: object, additionalProperties: true }
        provenance:
          type: object
          required: [provenance, source_ids, evidence_ids]
          properties:
            provenance:
              type: string
              enum: [extracted, agent_contributed, customer_asserted, human_confirmed]
            confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
            source_ids: { type: array, items: { type: string } }
            evidence_ids: { type: array, items: { type: string } }
        freshness:
          type: object
          required: [schema_version, source_system, updated_at]
          properties:
            schema_version: { type: integer }
            source_system: { type: string }
            updated_at: { type: string, format: date-time }
            projected_at: { type: [string, "null"], format: date-time }
            projector: { type: [string, "null"] }

    Error:
      type: object
      required: [error]
      description: |
        Canonical error envelope (Engineering Standards §4.1). All error
        responses wrap the error body under an `error` key; there is no
        top-level `code`/`message`.
      properties:
        error:
          type: object
          required: [code, message, request_id, docs_url]
          properties:
            code:
              type: string
              description: Machine-readable error code, `{domain}_{condition}` snake_case (see Engineering Standards section 4.3). Stable once shipped; never renamed.
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
              description: Optional structured context, e.g. a `reason` enum specific to the operation
            request_id:
              type: string
              description: Correlation ID for support, echoed from the request
            docs_url:
              type: string
              description: Link to the published error reference for this code, e.g. https://docs.brain.fi/resources/errors#{code}

    #
    # Raw layer
    #

    RawSourceType:
      type: string
      description: >
        One reconciled, provider-named artifact source vocabulary: the eight
        connectable source types plus the non-connector ingestion origins
        (agent contributions, human Wiki annotations, and `other`, the
        universal fallback for sources with no native connector).
      enum:
        - plaid
        - stripe
        - netsuite
        - email_inbound
        - csv_upload
        - pdf_upload
        - alchemy_wallet
        - eth_address
        - merge_accounting
        - agent_contributed
        - wiki_annotation
        - other

    RawIngestResponse:
      type: object
      properties:
        raw_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
        source_type: { $ref: '#/components/schemas/RawSourceType' }
        source_schema:
          type: string
          description: Declared payload schema tag, echoed when one was declared
        bytes: { type: integer }
        ingested_at: { type: string, format: date-time }
        deduplicated:
          type: boolean
          description: True if this artifact was already in storage
        extraction_job:
          $ref: '#/components/schemas/RawExtractionJob'

    RawExtractionJob:
      type: object
      required:
        [job_id, raw_id, status, parsed_id, confidence, error, next_attempt_at, created_at, updated_at]
      properties:
        job_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        raw_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        parsed_id:
          type: [string, "null"]
          pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$'
        confidence:
          type: [number, "null"]
          minimum: 0
          maximum: 1
        error:
          type: [object, "null"]
          additionalProperties: true
        next_attempt_at:
          type: [string, "null"]
          format: date-time
          description: Nullable retry due time for transient extraction failures.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RawParsed:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        raw_artifact_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        parser: { type: string }
        parser_version: { type: string }
        extracted:
          type: object
          additionalProperties: true
        confidence: { type: number, minimum: 0, maximum: 1 }
        extracted_at: { type: string, format: date-time }

    SourceType:
      type: string
      description: Connectable source-connector vocabulary for POST /sources. A subset of RawSourceType — excludes the non-connector origins (agent_contributed, wiki_annotation, other).
      enum:
        - plaid
        - stripe
        - netsuite
        - email_inbound
        - csv_upload
        - pdf_upload
        - alchemy_wallet
        - eth_address
        - merge_accounting
        - finch

    SourceFreshness:
      type: string
      description: |
        Derived source freshness. `fresh` means the source synced within the
        last 24 hours. `stale` means the last sync is older than 24 hours.
        `never_synced` means there is no successful sync timestamp. `error`
        mirrors an error source status.
      enum: [fresh, stale, error, never_synced]

    Source:
      type: object
      required: [id, tenantId, type, status, last_synced_at, freshness, metadata, error_message, is_stub, created_at, updated_at]
      properties:
        id: { type: string }
        tenantId: { type: string }
        type: { $ref: '#/components/schemas/SourceType' }
        status:
          type: string
          enum: [active, paused, error, disconnected]
        last_synced_at: { type: [string, "null"], format: date-time }
        freshness: { $ref: '#/components/schemas/SourceFreshness' }
        metadata:
          type: object
          additionalProperties: true
        error_message: { type: [string, "null"] }
        is_stub:
          type: boolean
          description: True for connector types without a concrete adapter (netsuite, email_inbound, csv_upload, pdf_upload, alchemy_wallet, eth_address). Sync on a stub source returns immediately with notes:"stub".
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SourceSyncJob:
      type: object
      required: [job_id, source_id, status]
      properties:
        job_id: { type: string }
        source_id: { type: string }
        status:
          type: string
          enum: [enqueued, running, succeeded, failed]
        error_message: { type: [string, "null"] }
        notes: { type: string, enum: [stub] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    #
    # Wiki layer
    #

    EntityKind:
      type: string
      enum:
        - account
        - counterparty
        - transaction
        - obligation
        - policy
        - agent

    Provenance:
      type: string
      enum:
        - extracted
        - inferred
        - ambiguous
        - human_confirmed
        - agent_contributed

    WikiEntity:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        kind: { $ref: '#/components/schemas/EntityKind' }
        attributes:
          type: object
          additionalProperties: true
        valid_from: { type: string, format: date-time }
        valid_to: { type: [string, "null"], format: date-time }
        provenance: { $ref: '#/components/schemas/Provenance' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        source_evidence:
          type: array
          items: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }

    RelationKind:
      type: string
      enum:
        - transacted_with
        - owes
        - owed_by
        - governed_by

    WikiRelation:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        src: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        dst: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        kind: { $ref: '#/components/schemas/RelationKind' }
        attributes:
          type: object
          additionalProperties: true
        valid_from: { type: string, format: date-time }
        valid_to: { type: [string, "null"], format: date-time }
        provenance: { $ref: '#/components/schemas/Provenance' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        source_evidence:
          type: array
          items: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }

    EvidenceChain:
      type: object
      properties:
        entity_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        chain:
          type: array
          items:
            type: object
            properties:
              raw_parsed_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
              parser: { type: string }
              confidence: { type: number }
              extracted_fields:
                type: array
                items: { type: string }

    WikiAnswer:
      type: object
      properties:
        question: { type: string }
        answer: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        evidence_path:
          type: array
          items:
            type: object
            properties:
              step: { type: integer }
              description: { type: string }
              entity_id: { type: [string, "null"], pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
              sql_query: { type: [string, "null"] }
              result_summary: { type: string }
        llm_metadata:
          type: object
          properties:
            model: { type: string }
            tokens_input: { type: integer }
            tokens_output: { type: integer }
            latency_ms: { type: integer }

    EntityAnnotation:
      type: object
      required: [target, kind]
      description: |
        Phase 3 only accepts `kind` in `policy`/`agent` (WIKI_KINDS).
        Annotating a Ledger-truth kind (account, counterparty,
        transaction, obligation) returns `request_body_invalid` — that
        write-through path is not yet implemented.
      properties:
        target: { type: string, enum: [entity] }
        entity_id:
          type: string
          pattern: '^ent_[0-9A-HJKMNP-TV-Z]{26}$'
          description: Omit to create a new entity; provide to supersede an existing one (must already exist, else `wiki_entity_not_found`).
        kind: { type: string, enum: [policy, agent] }
        attributes:
          type: object
          additionalProperties: true
          description: Validated against the JSON Schema for `kind`.
        confidence: { type: number, minimum: 0, maximum: 1, default: 1.0 }

    RelationAnnotation:
      type: object
      required: [target, src, dst, kind]
      properties:
        target: { type: string, enum: [relation] }
        src: { type: string, pattern: '^ent_[0-9A-HJKMNP-TV-Z]{26}$' }
        dst: { type: string, pattern: '^ent_[0-9A-HJKMNP-TV-Z]{26}$' }
        kind: { type: string, description: One of the registered RELATION_KINDS. }
        attributes:
          type: object
          additionalProperties: true
          description: Validated against the JSON Schema for `kind`.
        confidence: { type: number, minimum: 0, maximum: 1, default: 1.0 }

    #
    # Policy layer
    #

    Policy:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        tenant_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        version: { type: integer }
        content:
          $ref: '#/components/schemas/PolicyDSL'
        content_hash: { type: string }
        signers:
          type: array
          items:
            type: object
            properties:
              address: { type: string }
              signature: { type: string }
        activated_at: { type: string, format: date-time }
        deactivated_at: { type: [string, "null"], format: date-time }
        onchain_tx_hash:
          type: [string, "null"]
          description: Set for enterprise tier after BrainPolicyRegistry registration

    PolicyDSL:
      type: object
      required: [version, rules]
      properties:
        version: { type: integer }
        rules:
          type: array
          items: { $ref: '#/components/schemas/PolicyRule' }
        lists:
          type: object
          additionalProperties: { type: array, items: { type: string } }
          description: Named counterparty-id lists referenced by `when.counterparty_in` / `counterparty_not_in`
        message_templates:
          type: array
          items: { type: object, additionalProperties: true }
          description: Tenant-approved counterparty message templates

    PolicyRule:
      type: object
      required: [id, applies_to, execute]
      properties:
        id: { type: string }
        applies_to:
          type: array
          items:
            type: string
            enum:
              - outbound_payment
              - inbound_payment
              - ledger_write
              - onchain_tx
              - any
        when:
          type: object
          description: Condition primitives (see Engineering Standards section 8)
          properties:
            counterparty_in: { type: string, description: Reference to a named list }
            counterparty_not_in: { type: string }
            amount_lte:
              type: object
              properties:
                currency: { type: string }
                value: { type: number }
            amount_gt:
              type: object
              properties:
                currency: { type: string }
                value: { type: number }
            agent_role: { type: string }
            time_window: { type: string, description: Cron expression }
        require:
          type: array
          items:
            type: string
            description: Approver roles or compound conditions
        execute:
          type: string
          enum: [auto, confirm, reject]

    ProposedAction:
      type: object
      required: [kind]
      description: |
        Matches the policy VM's `Action` shape (services/policy/src/vm.ts).
        Field names are `kind`/`counterparty_id`, not `type`/`counterparty`.
      properties:
        kind:
          type: string
          enum:
            - outbound_payment
            - inbound_payment
            - ledger_write
            - onchain_tx
            - agent_action
        counterparty_id:
          type: [string, "null"]
          description: Entity ID of the counterparty
        amount:
          type: [object, "null"]
          properties:
            currency: { type: string }
            value: { type: string, description: Decimal string }
        agent_role: { type: [string, "null"] }
        timestamp:
          type: string
          format: date-time
          description: Defaults to the request time if omitted
        agent_id: { type: [string, "null"] }
        tenant_category: { type: [string, "null"], enum: [business, consumer, null] }
        confidence: { type: [number, "null"] }
        evidence_score: { type: [number, "null"] }
        risk_level: { type: [string, "null"], enum: [low, medium, high, critical, null] }

    PolicyDecision:
      type: object
      required: [outcome, matched_rule_id, required_approvers, trace]
      properties:
        outcome:
          type: string
          enum: [allow, confirm, reject]
        matched_rule_id: { type: [string, "null"] }
        required_approvers:
          type: array
          items: { type: string }
        trace:
          type: array
          items:
            type: object
            required: [rule_id, matched, checks]
            properties:
              rule_id: { type: string }
              matched: { type: boolean }
              checks:
                type: array
                items:
                  type: object
                  properties:
                    key: { type: string, description: 'The RuleWhen primitive checked, e.g. amount_lte' }
                    passed: { type: boolean }
                    detail: { type: string }
        policy_version: { type: integer }

    #
    # Execution layer
    #

    ProposalStatus:
      type: string
      description: |
        Complete proposal read status enum. Clients that see `unknown` must
        refetch and never assume success.
      enum:
        - proposed
        - pending
        - pending_approval
        - awaiting_second_approval
        - approved
        - acknowledged
        - reconciling
        - paused
        - dispatching
        - rejected
        - executed
        - failed
        - cancelled
        - undone
        - unknown

    ProposalDecision:
      type: string
      enum: [approve, reject, acknowledge, undo]

    ProposalDecisionResult:
      type: object
      required: [id, decision, status, audit_id, payment_intent_id]
      properties:
        id: { type: string }
        decision: { $ref: '#/components/schemas/ProposalDecision' }
        status: { $ref: '#/components/schemas/ProposalStatus' }
        audit_id:
          type: [string, "null"]
          description: Existing or newly written `proposal.decided` audit event id.
        payment_intent_id:
          type: [string, "null"]
          description: Present when the decision was delegated to the PaymentIntent lifecycle.

    Proposal:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        tenant_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        proposing_agent: { type: string }
        action: { $ref: '#/components/schemas/ProposedAction' }
        policy_version: { type: integer }
        policy_decision: { $ref: '#/components/schemas/PolicyDecision' }
        required_approvers:
          type: array
          items: { type: string }
        status: { $ref: '#/components/schemas/ProposalStatus' }
        created_at: { type: string, format: date-time }
        idempotency_key: { type: [string, "null"] }

    ExecutionStatus:
      type: string
      enum: [started, succeeded, failed, timeout]

    Execution:
      type: object
      properties:
        id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        proposal_id: { type: string, pattern: '^[a-z]+_[0-9A-HJKMNP-TV-Z]{26}$' }
        rail:
          type: string
          enum: [bank_ach, erp_writeback, onchain_base, notification]
        rail_receipt:
          type: object
          additionalProperties: true
        started_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
        status: { $ref: '#/components/schemas/ExecutionStatus' }
        error:
          type: [string, "null"]

    #
    # Audit layer
    #

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        layer:
          type: string
          enum: [raw, ledger, wiki, policy, agent, execution, audit]
          description: |
            v0.2 adds `ledger`, `agent`, and `audit`. Legacy `execution`
            value is preserved for back-compat with v0.1 clients; new code
            emits `agent`.
        actor: { type: string }
        action: { type: string }
        inputs:
          type: object
          description: Hashes and evidence refs, not full content
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        policy_version:
          type: [integer, "null"]
        policy_decision_id:
          type: [string, "null"]
        before_state:
          type: [object, "null"]
          additionalProperties: true
        after_state:
          type: [object, "null"]
          additionalProperties: true
        event_hash: { type: string }
        prev_event_hash: { type: [string, "null"] }
        created_at: { type: string, format: date-time }

    #
    # Ledger layer (v0.2)
    #

    LedgerProvenance:
      type: string
      description: >
        Trust contract for derived rows. `customer_asserted` marks generic-push
        and unknown-source data: confidence is capped at 0.5 and the §6 gate
        refuses auto-execution on it until corroboration promotes the row to
        `extracted`.
      enum:
        [extracted, inferred, ambiguous, human_confirmed, agent_contributed, customer_asserted]

    LedgerCommonFields:
      type: object
      description: |
        Fields common to every Ledger entity. Composed via allOf. Clients
        correlate `source_ids` and, where present, `external_account_id` to
        `/sources` to display connector freshness and source health. Ledger
        reads do not join the raw service.
      properties:
        id: { type: string }
        owner_id:
          type: string
          description: Tenant id (tnt_<ulid>)
        source_ids:
          type: array
          items: { type: string }
          description: raw_artifacts ids
        evidence_ids:
          type: array
          items: { type: string }
          description: raw_parsed ids
        provenance: { $ref: '#/components/schemas/LedgerProvenance' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Account:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, account_type, name, currency, status]
          properties:
            institution: { type: [string, "null"] }
            external_account_id: { type: [string, "null"] }
            account_type:
              type: string
              enum: [bank_checking, bank_savings, card, loan, line_of_credit, onchain, payment_processor]
            name: { type: string }
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            current_balance: { type: [string, "null"] }
            available_balance: { type: [string, "null"] }
            status:
              type: string
              enum: [active, closed, frozen, pending]

    Balance:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, account_id, as_of, currency]
          properties:
            account_id: { type: string }
            as_of: { type: string, format: date-time }
            current_balance: { type: string }
            available_balance: { type: [string, "null"] }
            pending_balance: { type: [string, "null"] }
            currency: { type: string, pattern: '^[A-Z]{3}$' }

    Transaction:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, account_id, amount, currency, direction, transaction_date, status]
          properties:
            account_id: { type: string }
            external_transaction_id: { type: [string, "null"] }
            amount: { type: string, pattern: '^-?\d+(\.\d+)?$' }
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            direction:
              type: string
              enum: [inflow, outflow, transfer, adjustment]
            transaction_date: { type: string, format: date-time }
            posted_date: { type: [string, "null"], format: date-time }
            counterparty_id: { type: [string, "null"] }
            category_id: { type: [string, "null"] }
            status:
              type: string
              enum: [pending, posted, cleared, failed, reversed, disputed]
            description_raw: { type: [string, "null"] }
            description_normalized: { type: [string, "null"] }
            reconciliation_status:
              type: [string, "null"]
              enum: [unreconciled, matched, partial, disputed]

    Member:
      type: object
      required: [id, tenantId, email, displayName, role, status, active, approval]
      description: |
        A tenant approval-authority actor. Response field names are
        camelCase, unlike the snake_case request bodies below and most
        other Brain resources. `active` and `status` are kept in sync
        server-side: `active` is true only when `status` is `active`.
      properties:
        id: { type: string }
        tenantId: { type: string }
        email: { type: string }
        displayName: { type: string }
        role:
          type: string
          enum: [admin, approver, viewer]
        status:
          type: string
          enum: [invited, active, deactivated]
        active: { type: boolean }
        approval:
          type: object
          required: [domains, perItemLimit, requiresSecondApproverAbove]
          properties:
            domains:
              type: array
              items:
                type: string
                enum: [ap, ar, treasury, payroll, reconciliation]
            perItemLimit:
              type: integer
              description: Per-item approval limit in minor units (cents)
            requiresSecondApproverAbove:
              type: [integer, "null"]
              description: Amount in minor units (cents) above which a distinct second member must also approve. Null means no second-approval threshold.

    ProductionAgentToken:
      type: object
      required: [id, token, principal_type, subject, tenant_id, token_id, scopes, expires_in, use]
      description: |
        Propose-only production BFF service agent credential. This is not a
        member session and cannot approve, execute, sign, administer, or
        resolve as a member.
      properties:
        id: { type: string, pattern: '^agent_[0-9A-HJKMNP-TV-Z]{26}$' }
        token: { type: string, description: Bearer JWT returned only to the platform caller. }
        principal_type: { type: string, enum: [agent] }
        subject: { type: string, pattern: '^agent_[0-9A-HJKMNP-TV-Z]{26}$' }
        tenant_id: { type: string, pattern: '^tnt_[0-9A-HJKMNP-TV-Z]{26}$' }
        token_id: { type: string, pattern: '^token_[0-9A-HJKMNP-TV-Z]{26}$' }
        scopes:
          type: array
          items:
            type: string
            enum:
              - ledger:read
              - wiki:read
              - raw:read
              - raw:write
              - policy:read
              - execution:read
              - execution:propose
              - payment_intent:propose
              - audit:read
        expires_in: { type: integer, enum: [3600] }
        use: { type: string, enum: [propose-only agent workflows] }

    MemberCreateRequest:
      type: object
      required: [email, role, approval]
      properties:
        id: { type: string, description: Caller-supplied member id. Defaults to a generated user id. }
        email: { type: string }
        display_name: { type: string, description: Defaults to email if omitted. }
        role:
          type: string
          enum: [admin, approver, viewer]
        invite:
          type: boolean
          default: false
          description: When true, member is created with status:invited and an invite_token is returned instead of being immediately active. A caller-supplied `status` field is accepted by the schema but ignored by create — only `invite` controls initial status.
        approval:
          type: object
          required: [domains]
          properties:
            domains:
              type: array
              items:
                type: string
                enum: [ap, ar, treasury, payroll, reconciliation]
            per_item_limit_cents:
              type: [integer, string]
              description: Defaults to 0 if omitted.
            requires_second_approver_above_cents:
              type: [integer, string, "null"]

    MemberUpdateRequest:
      type: object
      description: |
        All fields optional. Only fields present are changed. `status`
        and `active` are kept in sync server-side regardless of which
        one is sent (see PATCH /members/{id}).
      properties:
        email: { type: string }
        display_name: { type: string }
        role:
          type: string
          enum: [admin, approver, viewer]
        status:
          type: string
          enum: [invited, active, deactivated]
        active: { type: boolean }
        approval:
          type: object
          properties:
            domains:
              type: array
              items:
                type: string
                enum: [ap, ar, treasury, payroll, reconciliation]
            per_item_limit_cents:
              type: [integer, string]
            requires_second_approver_above_cents:
              type: [integer, string, "null"]

    MemberIdentityLinkRequest:
      type: object
      required: [surface, external_ref]
      properties:
        surface:
          type: string
          enum: [slack, teams, email]
        external_ref:
          type: string
          description: Surface-specific external identity reference (Slack user id, Teams AAD object id, verified email address).

    Counterparty:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, name, display_name, type]
          properties:
            name: { type: string }
            display_name: { type: string }
            normalized_name: { type: [string, "null"] }
            type:
              type: string
              enum: [merchant, vendor, customer, employer, employee, bank, wallet, exchange, tax_authority, agent, other]
            risk_level:
              type: [string, "null"]
              enum: [low, medium, high, sanctioned]
            verified_status:
              type: [string, "null"]
              enum: [unverified, self_attested, document_verified, sanctions_cleared]
            aliases:
              type: array
              items: { type: string }
            linked_accounts:
              type: array
              items: { type: string }

    Obligation:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, type, counterparty_id, amount_due, currency, due_date, status]
          properties:
            type:
              type: string
              enum: [bill, invoice, subscription, loan, rent, payroll, tax, card_statement, other]
            counterparty_id: { type: string }
            amount_due: { type: string }
            minimum_due: { type: [string, "null"] }
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            due_date: { type: string, format: date-time }
            recurrence: { type: [string, "null"] }
            status:
              type: string
              enum: [upcoming, due, paid, overdue, cancelled, disputed]
            linked_transaction_ids:
              type: array
              items: { type: string }

    CashFlowSummary:
      type: object
      required: [tenantId, since, until, currencies]
      properties:
        tenantId: { type: string }
        since: { type: string, format: date-time }
        until: { type: string, format: date-time }
        currencies:
          type: array
          items:
            type: object
            required: [currency, inflow, outflow, net, transaction_count, by_day]
            properties:
              currency: { type: string, pattern: '^[A-Z]{3}$' }
              inflow: { type: string, description: Decimal string }
              outflow: { type: string, description: Decimal string }
              net: { type: string, description: Decimal string }
              transaction_count: { type: integer }
              by_day:
                type: array
                items:
                  type: object
                  required: [date, inflow, outflow, net]
                  properties:
                    date: { type: string, description: 'YYYY-MM-DD' }
                    inflow: { type: string }
                    outflow: { type: string }
                    net: { type: string }

    Invoice:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, invoice_number, counterparty_id, amount_due, currency, issue_date, status]
          properties:
            invoice_number: { type: string }
            counterparty_id: { type: string }
            amount_due: { type: string }
            amount_paid: { type: [string, "null"] }
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            issue_date: { type: string, format: date-time }
            due_date: { type: [string, "null"], format: date-time }
            status:
              type: string
              enum: [draft, sent, partial, paid, overdue, cancelled, disputed]
            linked_document_ids:
              type: array
              items: { type: string }
            linked_transaction_ids:
              type: array
              items: { type: string }

    ProposalType:
      type: string
      enum:
        - vendor_risk
        - payment
        - collections
        - treasury
        - cash_forecast
        - dispute
        - compliance
        - revenue_intel
        - reconciliation
        - subscription
        - fraud_anomaly

    ProposalRiskBand:
      type: string
      enum: [low, standard, elevated, high]

    ProposalMode:
      type: string
      enum: [propose, notify_only]

    ProposalAgent:
      type: object
      required: [id, kind, display_name]
      properties:
        id: { type: string }
        kind:
          type: string
          description: Stored agent provenance, for example `internal` or `external`.
        display_name: { type: string }

    ProposalEvidenceRef:
      type: object
      required: [kind, ref, resolvable]
      properties:
        kind:
          type: string
          description: Canonical evidence kind after reconciling the stored label with the ref prefix, for example `invoice`, `counterparty`, `transaction`, `wiki_entity`, `document`, `policy`, `agent`, or `unknown`.
        ref:
          type: string
          description: Stored evidence reference. Never a `brain://` placeholder.
        resolvable:
          type: boolean
          description: True when this ref kind is supported by `POST /v1/evidence/resolve`. Existence is checked by the resolver endpoint via `not_found`.

    EvidenceResolveRef:
      type: object
      required: [kind, ref]
      properties:
        kind:
          type: string
          description: Evidence kind. Supported kinds are counterparty, transaction, obligation, account, invoice, and wiki_entity. If the ref has a recognized Brain id prefix, the resolver uses the prefix-inferred kind for dispatch.
        ref:
          type: string
          description: Stored evidence reference. Never a `brain://` placeholder.

    EvidenceResolveRequest:
      type: object
      required: [refs]
      properties:
        refs:
          type: array
          maxItems: 50
          items: { $ref: '#/components/schemas/EvidenceResolveRef' }

    EvidenceResolveResult:
      type: object
      required: [kind, ref, resolvable, not_found, summary, deep_link]
      properties:
        kind:
          type: string
          description: Canonical evidence kind used for dispatch after ref-prefix reconciliation.
        ref: { type: string }
        resolvable:
          type: boolean
          description: False for unsupported kinds or malformed refs.
        not_found:
          type: boolean
          description: True when the kind is supported but no row exists for the caller tenant.
        summary:
          type: [string, "null"]
          description: Short display summary for a resolved row. Null when unsupported or not found.
        deep_link:
          type: [string, "null"]
          description: Canonical API path for the resolved row. Null when unsupported or not found.
        reason:
          type: string
          enum: [unsupported_kind, malformed_ref]

    EvidenceResolveResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: '#/components/schemas/EvidenceResolveResult' }

    AgentOutputProposal:
      type: object
      required:
        - id
        - type
        - created_at
        - status
        - risk_band
        - confidence
        - mode
        - narrative
        - evidence
        - agent
        - payment_intent_id
        - action_type
      properties:
        id: { type: string }
        type: { $ref: '#/components/schemas/ProposalType' }
        created_at: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/ProposalStatus' }
        risk_band:
          oneOf:
            - $ref: '#/components/schemas/ProposalRiskBand'
            - type: "null"
        confidence: { type: [number, "null"], minimum: 0, maximum: 1 }
        mode: { $ref: '#/components/schemas/ProposalMode' }
        narrative:
          type: [string, "null"]
          description: Grounded human-readable summary when the stored output has one.
        evidence:
          type: array
          description: Stored evidence refs. Unresolvable refs are returned with `resolvable=false` rather than dropped or fabricated.
          items: { $ref: '#/components/schemas/ProposalEvidenceRef' }
        agent:
          oneOf:
            - $ref: '#/components/schemas/ProposalAgent'
            - type: "null"
        payment_intent_id: { type: [string, "null"] }
        action_type:
          type: [string, "null"]
          description: Present for money-path proposals backed by PaymentIntent.

    PaymentIntent:
      allOf:
        - $ref: '#/components/schemas/LedgerCommonFields'
        - type: object
          required: [id, owner_id, action_type, source_account_id, destination_counterparty_id, amount, currency, status]
          properties:
            created_by_agent_id: { type: string }
            action_type:
              type: string
              description: >-
                `x402_settle` (USDC on Base) and `escrow_release` (BrainEscrow
                lock release, RFC 0001 §7.6) are gated but not yet executable
                (shadow-first).
              enum: [ach_outbound, ach_inbound, wire, onchain_transfer, erp_writeback, card_payment, x402_settle, escrow_release, other]
            source_account_id: { type: string }
            destination_counterparty_id: { type: string }
            amount: { type: string }
            # ISO-4217 (3-letter) for fiat rails; USDC for x402_settle (D-4, RFC 0001 §7.1).
            currency: { type: string, pattern: '^[A-Z]{3}$|^USDC$' }
            obligation_id: { type: [string, "null"] }
            invoice_id: { type: [string, "null"] }
            status:
              type: string
              description: |
                Complete PaymentIntent status enum. Clients that see `unknown`
                must refetch and never assume success.
              enum:
                - proposed
                - pending_approval
                - awaiting_second_approval
                - approved
                - paused
                - dispatching
                - rejected
                - executed
                - failed
                - cancelled
                - reconciling
                - unknown
            policy_decision_id: { type: [string, "null"] }
            approval_ids:
              type: array
              items: { type: string }
            execution_receipt_ids:
              type: array
              items: { type: string }
            agent:
              oneOf:
                - $ref: '#/components/schemas/ProposalAgent'
                - type: "null"
              description: Present only when requested with `?expand=agent`.

    ReconciliationMatch:
      type: object
      required: [id, owner_id, match_type, left_entity_type, left_entity_id, right_entity_type, right_entity_id, status]
      properties:
        id: { type: string }
        owner_id: { type: string }
        match_type:
          type: string
          enum:
            - transaction_receipt
            - invoice_payment
            - statement_balance
            - wallet_transfer
            - payroll_bank_debit
            - subscription_charge
            - card_charge
        left_entity_type: { type: string }
        left_entity_id: { type: string }
        right_entity_type: { type: string }
        right_entity_id: { type: string }
        confidence_score: { type: number, minimum: 0, maximum: 1 }
        status:
          type: string
          enum: [unmatched, matched, partially_matched, duplicate_possible, disputed, cleared, failed, reversed]
        evidence_ids:
          type: array
          items: { type: string }
        explanation: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    #
    # Wiki memory pages (v0.2)
    #

    WikiPage:
      type: object
      required: [id, page_type, slug, body_md, rendered_at]
      properties:
        id: { type: string }
        page_type:
          type: string
          enum: [account, counterparty, obligation, invoice, agent, policy, monthly_summary, cash_flow]
        subject_id: { type: [string, "null"] }
        slug: { type: string }
        body_md:
          type: string
          description: |
            Markdown with the standard Brain memory page sections:
            Current Truth, Key Linked Entities, Recent Activity,
            Open Questions / Missing Evidence, Risk Notes, Timeline,
            Evidence Links.
        rendered_at: { type: string, format: date-time }
        source_revision:
          type: string
          description: Ledger checksum at render time

    #
    # Agent (v0.2 — replaces Execution)
    #

    Agent:
      type: object
      required: [id, kind, role, display_name, state]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [internal, external]
        role:
          type: string
          enum: [reconciliation, payment, anomaly, partner]
        display_name: { type: string }
        scope_hash:
          type: [string, "null"]
          pattern: '^[0-9a-f]{64}$'
        onchain_address:
          type: [string, "null"]
          pattern: '^0x[a-fA-F0-9]{40}$'
        state:
          type: string
          enum: [pending_onchain, active, revoked, failed, quarantined]
        registered_tx: { type: [string, "null"] }
        registered_at: { type: [string, "null"], format: date-time }

    # Agent Autonomy v3 — routing + run records
    AgentRunStatus:
      type: string
      enum:
        - routing
        - routed
        - no_match
        - unscoped
        - missing_handler
        - missing_action
        - missing_evidence
        - proposal_created
        - confirmation_required
        - executed
        - notify_only
        - rejected
        - failed
        - duplicate_skipped
        - paused
        - shadow_completed

    AgentRouteRequest:
      type: object
      description: One of `event` or `intent` is required.
      properties:
        event: { type: string }
        intent: { type: string }
        context: { type: object }

    RoutingDecision:
      type: object
      properties:
        selected_agent_id: { type: [string, "null"] }
        fallback_agent_ids: { type: array, items: { type: string } }
        confidence: { type: number }
        evidence_score: { type: number }
        policy_status: { type: string, enum: [routed, unscoped, no_match] }
        execution_mode:
          type: [string, "null"]
          enum: [execute, propose, confirm, notify_only, reject, null]
        reason: { type: string }

    AgentRunResult:
      type: object
      properties:
        status: { $ref: '#/components/schemas/AgentRunStatus' }
        routing_decision_id: { type: string }
        run_id: { type: [string, "null"] }
        selected_agent_id: { type: [string, "null"] }
        action: { type: [string, "null"] }
        shadow_mode: { type: boolean }
        proposed:
          type: object
          properties:
            id: { type: string }
            status: { type: string }
            policy_decision_id: { type: [string, "null"] }
        reason: { type: object }

    AgentRun:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        tenant_category: { type: string, enum: [business, consumer] }
        agent_id: { type: string }
        agent_kind: { type: string, enum: [internal, external] }
        event_type: { type: [string, "null"] }
        intent: { type: [string, "null"] }
        action: { type: [string, "null"] }
        execution_mode: { type: string, enum: [execute, propose, confirm, notify_only, reject] }
        status: { $ref: '#/components/schemas/AgentRunStatus' }
        confidence: { type: [number, "null"] }
        evidence_score: { type: [number, "null"] }
        policy_status: { type: [string, "null"], enum: [allow, confirm, reject, unknown, null] }
        proposal_id: { type: [string, "null"] }
        payment_intent_id: { type: [string, "null"] }
        policy_decision_id: { type: [string, "null"] }
        routing_decision_id: { type: [string, "null"] }
        reason: { type: object }
        shadow_mode: { type: boolean }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }

    #
    # MCP — JSON-RPC 2.0 envelopes for the /agents/mcp surface
    #

    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        id:
          oneOf:
            - { type: string }
            - { type: integer }
            - { type: 'null' }
          description: |
            Request id echoed in the response. Omit for notifications
            (Brain's MCP surface treats notifications as no-ops at v0.3).
        method:
          type: string
          enum:
            - initialize
            - ping
            - tools/list
            - tools/call
            - resources/list
            - resources/read
            - prompts/list
            - prompts/get
        params:
          type: object
          description: |
            Method-specific parameters. For `tools/call`, this is
            `{ name: string, arguments: object }`. For `resources/read`,
            `{ uri: string }`. For `prompts/get`,
            `{ name: string, arguments?: object }`.
          additionalProperties: true

    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        id:
          oneOf:
            - { type: string }
            - { type: integer }
            - { type: 'null' }
        result:
          description: |
            Present on success. Shape depends on the method —
            `initialize` returns `InitializeResult`, `tools/list` returns
            `{ tools: ToolDescriptor[] }`, `tools/call` returns
            `ToolCallResult`, etc. See `docs/mcp-architecture.md`.
          oneOf:
            - $ref: '#/components/schemas/InitializeResult'
            - type: object
              required: [tools]
              properties:
                tools:
                  type: array
                  items: { $ref: '#/components/schemas/ToolDescriptor' }
            - $ref: '#/components/schemas/ToolCallResult'
            - type: object
              additionalProperties: true
        error:
          $ref: '#/components/schemas/JsonRpcError'

    JsonRpcError:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/McpErrorCode'
        message: { type: string }
        data:
          type: object
          additionalProperties: true
          description: Optional structured error payload (e.g. policy violations)

    McpErrorCode:
      type: integer
      description: |
        JSON-RPC 2.0 error codes plus Brain-specific MCP codes.
        Standard codes in the -32700..-32603 range follow the spec.
        Brain codes in the -32001..-32005 range correspond 1:1 with
        Brain error codes (see Engineering Standards section 3):
          * -32001 → auth_token_missing
          * -32002 → auth_scope_insufficient
          * -32003 → agent_not_registered
          * -32004 → payment_intent_gate_failed
          * -32005 → agent_scope_hash_mismatch
      enum: [-32700, -32600, -32601, -32602, -32603, -32001, -32002, -32003, -32004, -32005]

    InitializeResult:
      type: object
      required: [protocolVersion, serverInfo, capabilities]
      properties:
        protocolVersion:
          type: string
          example: '2024-11-05'
        serverInfo:
          type: object
          required: [name, version]
          properties:
            name: { type: string, example: 'brain-mcp' }
            version: { type: string, example: '0.3.0' }
        capabilities:
          type: object
          properties:
            tools:
              type: object
              properties:
                listChanged: { type: boolean }
            resources:
              type: object
              properties:
                listChanged: { type: boolean }
                subscribe: { type: boolean }
            prompts:
              type: object
              properties:
                listChanged: { type: boolean }

    ToolDescriptor:
      type: object
      required: [name, description, inputSchema]
      properties:
        name:
          type: string
          description: |
            Tool name in `<group>.<verb>` form. v0.3 surface:
            `ledger.account.get`, `ledger.accounts.list`,
            `ledger.transactions.list`, `ledger.obligations.list`,
            `ledger.counterparties.list`, `wiki.question`,
            `wiki.page.get`, `raw.contribute`,
            `payment_intent.propose`, `agent.action.propose`.
        description: { type: string }
        inputSchema:
          type: object
          description: JSON Schema for the tool's `arguments` object.
          additionalProperties: true

    ToolCallResult:
      type: object
      required: [content]
      properties:
        content:
          type: array
          items:
            type: object
            required: [type, text]
            properties:
              type: { type: string, enum: [text] }
              text: { type: string }
        structuredContent:
          type: object
          additionalProperties: true
          description: |
            Machine-readable payload mirroring the human summary in
            `content[0].text`. Shape is tool-specific.
