display_information:
  name: Brain
  description: Brain approval cards for finance operations.
  background_color: "#101820"
features:
  bot_user:
    display_name: Brain
    always_online: false
oauth_config:
  redirect_urls:
    - https://surface.brain.fi/surfaces/slack/oauth/callback
  scopes:
    bot:
      - chat:write
      - chat:write.public
settings:
  interactivity:
    is_enabled: true
    request_url: https://surface.brain.fi/surfaces/slack/interactions
  event_subscriptions:
    request_url: https://surface.brain.fi/surfaces/slack/events
    bot_events:
      - app_uninstalled
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
