# Brain CI — PR pipeline.
# §10.2: on PR, run lint, unit tests, and contract compile.
# This workflow gates every PR to main.

name: pr

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------- TypeScript services ---------
  typescript:
    name: typescript (lint + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint + Prettier)
        run: pnpm run lint

      - name: Build workspace packages
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests + coverage
        run: pnpm run test:coverage

  # --------- Python agents workspace ---------
  python:
    name: python (lint + types + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agents
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Black format check
        run: uv run black --check .

      - name: mypy (strict)
        run: uv run mypy --strict brain_agents

      - name: pytest (80% coverage gate)
        run: uv run pytest

  # --------- Solidity contracts ---------
  contracts:
    name: contracts (forge build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
        # The toolchain resolves the release via the GitHub API; anonymous calls
        # are rate-limited to 60/hr and intermittently 403 in CI. Authenticating
        # with the workflow token raises that to 1000/hr and stops the flake.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install forge dependencies
        run: forge install foundry-rs/forge-std

      - name: forge fmt check
        run: forge fmt --check
        continue-on-error: true # no contracts yet — placeholder until stage-5

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv
        continue-on-error: true # no tests yet — placeholder until stage-5

  # --------- Secret scanning ---------
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        # Pinned version + direct versioned download — no unauthenticated
        # api.github.com "latest" lookup (that call is rate-limited to 60/hr and
        # intermittently 403/404'd in CI, flaking this job). Bump deliberately.
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks
        run: gitleaks detect --source . --log-opts="origin/main..HEAD" --redact --exit-code 1
