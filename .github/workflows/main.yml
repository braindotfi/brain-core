# Brain main-branch pipeline.
# On merge to main: secret scan, unit+integration, golden-path smoke, Python
# agents lint/type/test, build one VM image, deploy that image to staging, then
# wait for a production environment approval before promoting the same image to
# api.brain.fi.

name: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Secret scan on every push to main. PR coverage runs in pr.yml; this is the
  # belt to that suspender for direct pushes (merge commits, hotfix pushes)
  # that never went through a PR. Pre-commit hooks are bypassable with
  # --no-verify, so CI is the authoritative gate.
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks (push diff)
        # gitleaks detect against the push's commit range. `before..after` covers
        # everything new on this push, including amended merge commits.
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to the ref. Scan the full tree to baseline.
            gitleaks detect --source . --redact --exit-code 1
          else
            gitleaks detect --source . --log-opts="${BEFORE}..${AFTER}" --redact --exit-code 1
          fi

  unit_and_integration:
    name: unit + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brain
          POSTGRES_PASSWORD: brain
          POSTGRES_DB: brain
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://brain:brain@localhost:5432/brain
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      # Build workspace dist/ before typecheck: the per-package `tsc --noEmit`
      # resolves cross-package types from the built .d.ts files. Mirrors pr.yml.
      - run: pnpm run build
      - run: pnpm run typecheck
      - name: Migrate
        # DATABASE_URL is present during coverage, so DB-backed tests participate
        # there too. Migrate before coverage, not only before the integration pass.
        # The root build excludes tools/*, so build the migrate CLI before use.
        run: |
          pnpm -C tools/migrate run build
          node tools/migrate/dist/cli.js up
      - run: pnpm run test:coverage
      - name: Integration tests
        # `--if-present` must precede the script name; after it, pnpm forwards it
        # to vitest, which dies with `CACError: Unknown option --ifPresent`.
        run: pnpm -r --filter='./services/**' --filter='!./services/agents' run --if-present test:integration
      - name: Invariants DB-integration tests (P0.2)
        run: pnpm -C tests/invariants run test:integration
      - name: Adversarial safety tests (P1.1)
        run: pnpm -C tests/adversarial run test && pnpm -C tests/adversarial run test:integration

  golden_path_smoke:
    name: golden-path smoke
    runs-on: ubuntu-latest
    needs: unit_and_integration
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brain
          POSTGRES_PASSWORD: brain
          POSTGRES_DB: brain
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://brain:brain@localhost:5432/brain
      REDIS_URL: redis://localhost:6379
      AUTH_JWKS_URL: https://auth.brain.fi/.well-known/jwks.json
      BRAIN_DEMO_MODE: "true"
      BRAIN_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # The root build excludes tools/*; build them so the migrate CLI
      # (tools/migrate) and the seed CLI (tools/seed-golden-path, used by
      # golden-path.sh) exist before they are invoked below.
      - name: Build tools
        run: pnpm -r --filter './tools/**' run build
      - name: Migrate
        run: node tools/migrate/dist/cli.js up
      - name: Boot API (demo mode)
        run: |
          pnpm -C services/api start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break || sleep 2
          done
      - name: Golden path
        run: ./scripts/demo/golden-path.sh

  python_agents:
    name: python agents (lint + types + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agents
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Black format check
        run: uv run black --check .
      - name: mypy (strict)
        run: uv run mypy --strict brain_agents
      - name: pytest (80% coverage gate)
        run: uv run pytest

  build_image:
    name: build production image
    runs-on: ubuntu-latest
    needs: [unit_and_integration, golden_path_smoke, python_agents]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe` can derive SERVICE_VERSION
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          SERVICE_VERSION=$(git describe --tags --always --match 'v*')
          docker build --build-arg GIT_SHA=${{ github.sha }} --build-arg SERVICE_VERSION="$SERVICE_VERSION" -t ghcr.io/braindotfi/brain-core:${{ github.sha }} -f Dockerfile .
          docker push ghcr.io/braindotfi/brain-core:${{ github.sha }}
          docker build -t ghcr.io/braindotfi/brain-agents:${{ github.sha }} -f services/agents/Dockerfile services/agents
          docker push ghcr.io/braindotfi/brain-agents:${{ github.sha }}

  deploy_staging:
    name: deploy staging VM
    runs-on: ubuntu-latest
    needs: build_image
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # Scoped to this job (not the whole workflow) so a staging deploy is not
    # blocked by an older run parked at promote_production's approval gate.
    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: false # never cancel a deploy mid-flight
    env:
      VM_HOST: ${{ secrets.VM_HOST_STAGING }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY_STAGING }}
      VM_ENV_FILE: .env.staging
      COMPOSE_PROJECT: brain-staging
      HEALTH_URL: ${{ vars.BRAIN_STAGING_HEALTH_URL || 'https://staging-api.brain.fi/health' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      # Images alone are not enough: the VM's ~/brain-core is a copied tree,
      # not a git checkout, so changes to docker-compose.prod.yml and the
      # host files it bind-mounts into containers (db-roles.sql,
      # tools/postgres-init) never reach the box on their own. Ship exactly
      # the repo-tracked paths compose depends on, before any compose
      # invocation below. Host-only files (VM_ENV_FILE, docker-compose.caddy.yml)
      # are left untouched, they are not in this repo.
      - name: Sync compose and bind-mounted host files to VM
        run: |
          ssh -i ~/.ssh/id_deploy "azureuser@$VM_HOST" \
            'mkdir -p ~/brain-core/infra ~/brain-core/tools/postgres-init'
          scp -i ~/.ssh/id_deploy docker-compose.prod.yml "azureuser@$VM_HOST:~/brain-core/docker-compose.prod.yml"
          scp -i ~/.ssh/id_deploy infra/db-roles.sql "azureuser@$VM_HOST:~/brain-core/infra/db-roles.sql"
          scp -i ~/.ssh/id_deploy -r tools/postgres-init/. "azureuser@$VM_HOST:~/brain-core/tools/postgres-init/"

      # Tag the box's current :prod image as a rollback point BEFORE the
      # `docker tag` below overwrites the :prod tag. See docs/rollback.md §B.
      # Then prune images untouched for 3+ days so the rollback tags minted
      # here don't accumulate forever and fill the disk. `docker image prune
      # -a` never removes an image a container (running or stopped) still
      # references, so the live stack stays safe even on a box that hasn't
      # deployed in over 3 days. `|| true` so a prune failure never blocks
      # a deploy.
      - name: Tag rollback images on VM
        run: |
          ssh -i ~/.ssh/id_deploy "azureuser@$VM_HOST" \
            'ts=$(date +%Y%m%d-%H%M%S); docker tag brain-core:prod brain-core:prod-rollback-$ts || true; docker tag brain-agents:prod brain-agents:prod-rollback-$ts || true; docker image prune -af --filter until=72h || true'

      - name: Pull images from GHCR
        # The VM authenticates to ghcr.io via a one-time manual `docker login`
        # (persisted in ~/.docker/config.json); the pull relies on that stored
        # login, no token is passed over SSH. Retag to brain-core:prod so
        # docker-compose.prod.yml's `image: brain-core:${BRAIN_IMAGE_TAG:-prod}`
        # needs no change. Retag brain-agents too so --no-build can recreate
        # the agents service from the freshly shipped Python image.
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "docker pull ghcr.io/braindotfi/brain-core:${{ github.sha }} && \
             docker pull ghcr.io/braindotfi/brain-agents:${{ github.sha }} && \
             docker tag ghcr.io/braindotfi/brain-core:${{ github.sha }} brain-core:prod && \
             docker tag ghcr.io/braindotfi/brain-agents:${{ github.sha }} brain-agents:prod"

      # Cold-start safety: bring up infra + jwks + caddy if the box is fresh.
      # Idempotent on a warm box — --no-recreate leaves running containers
      # (incl. postgres) untouched; depends_on sequences a cold box correctly.
      - name: Ensure infra up on VM (cold-start safe)
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "cd ~/brain-core && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d --no-build --no-recreate postgres redis minio minio-setup db-roles jwks caddy"

      # The VM's ~/brain-core is a copied tree (not a git checkout) that
      # already holds the stage env file and docker-compose.caddy.yml (both
      # host-only, not in this repo). Migrations are idempotent, so running `up`
      # on every deploy is safe even when there are no new migrations.
      - name: Migrate + recreate api/worker/agents on VM
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "cd ~/brain-core && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml run --rm --no-deps migrate node tools/migrate/dist/cli.js up && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml run --rm --no-deps db-roles && \
             (docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml --profile agents up -d --no-deps --no-build api worker agents || \
              (docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml logs --tail=200 api worker agents && false))"

      - name: Smoke test /health
        # A bare 200 is not enough: /health returns 200 before a deploy too, so
        # a deploy that silently failed to recreate the container would still
        # pass. Assert the live commit matches the sha we just built and shipped.
        run: |
          expected="${{ github.sha }}"
          last_commit=""
          for i in $(seq 1 10); do
            body=$(curl -s "$HEALTH_URL" || true)
            last_commit=$(echo "$body" | grep -o '"commit":"[^"]*"' | sed 's/.*:"//;s/"$//')
            [ "$last_commit" = "$expected" ] && exit 0
            sleep 6
          done
          echo "$HEALTH_URL never reported commit=$expected (last seen: '$last_commit')"
          exit 1

  promote_production:
    name: promote production VM (api.brain.fi)
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the deploy/prod/* review tag after a green promote
    needs: deploy_staging
    environment: production
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # Scoped to this job so a run waiting on the production approval gate
    # occupies only its own slot, not deploy_staging's.
    concurrency:
      group: promote-prod-${{ github.ref }}
      cancel-in-progress: false # never cancel a deploy mid-flight
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_ENV_FILE: .env.prod
      COMPOSE_PROJECT: brain-prod
      HEALTH_URL: https://api.brain.fi/health
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      # Images alone are not enough: the VM's ~/brain-core is a copied tree,
      # not a git checkout, so changes to docker-compose.prod.yml and the
      # host files it bind-mounts into containers (db-roles.sql,
      # tools/postgres-init) never reach the box on their own. Ship exactly
      # the repo-tracked paths compose depends on, before any compose
      # invocation below. Host-only files (VM_ENV_FILE, docker-compose.caddy.yml)
      # are left untouched, they are not in this repo.
      - name: Sync compose and bind-mounted host files to VM
        run: |
          ssh -i ~/.ssh/id_deploy "azureuser@$VM_HOST" \
            'mkdir -p ~/brain-core/infra ~/brain-core/tools/postgres-init'
          scp -i ~/.ssh/id_deploy docker-compose.prod.yml "azureuser@$VM_HOST:~/brain-core/docker-compose.prod.yml"
          scp -i ~/.ssh/id_deploy infra/db-roles.sql "azureuser@$VM_HOST:~/brain-core/infra/db-roles.sql"
          scp -i ~/.ssh/id_deploy -r tools/postgres-init/. "azureuser@$VM_HOST:~/brain-core/tools/postgres-init/"

      # Prune images untouched for 3+ days so the rollback tags minted
      # above don't accumulate forever and fill the disk. `docker image
      # prune -a` never removes an image a container (running or stopped)
      # still references, so the live stack stays safe even on a box that
      # hasn't deployed in over 3 days. `|| true` so a prune failure never
      # blocks a deploy.
      - name: Tag rollback images on VM
        run: |
          ssh -i ~/.ssh/id_deploy "azureuser@$VM_HOST" \
            'ts=$(date +%Y%m%d-%H%M%S); docker tag brain-core:prod brain-core:prod-rollback-$ts || true; docker tag brain-agents:prod brain-agents:prod-rollback-$ts || true; docker image prune -af --filter until=72h || true'

      - name: Pull images from GHCR
        # See deploy_staging's "Pull images from GHCR" step: relies on the box's
        # stored `docker login`, no token over SSH; retag keeps compose unchanged.
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "docker pull ghcr.io/braindotfi/brain-core:${{ github.sha }} && \
             docker pull ghcr.io/braindotfi/brain-agents:${{ github.sha }} && \
             docker tag ghcr.io/braindotfi/brain-core:${{ github.sha }} brain-core:prod && \
             docker tag ghcr.io/braindotfi/brain-agents:${{ github.sha }} brain-agents:prod"

      # Cold-start safety: bring up infra + jwks + caddy if the box is fresh.
      # Idempotent on a warm box — --no-recreate leaves running containers
      # (incl. postgres) untouched; depends_on sequences a cold box correctly.
      - name: Ensure infra up on VM (cold-start safe)
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "cd ~/brain-core && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d --no-build --no-recreate postgres redis minio minio-setup db-roles jwks caddy"

      - name: Migrate + recreate api/worker/agents on VM
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 "azureuser@$VM_HOST" \
            "cd ~/brain-core && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml run --rm --no-deps migrate node tools/migrate/dist/cli.js up && \
             docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml run --rm --no-deps db-roles && \
             (docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml --profile agents up -d --no-deps --no-build api worker agents || \
              (docker compose -p $COMPOSE_PROJECT --env-file $VM_ENV_FILE -f docker-compose.prod.yml -f docker-compose.caddy.yml logs --tail=200 api worker agents && false))"

      - name: Smoke test /health
        run: |
          expected="${{ github.sha }}"
          last_commit=""
          for i in $(seq 1 10); do
            body=$(curl -s "$HEALTH_URL" || true)
            last_commit=$(echo "$body" | grep -o '"commit":"[^"]*"' | sed 's/.*:"//;s/"$//')
            [ "$last_commit" = "$expected" ] && exit 0
            sleep 6
          done
          echo "$HEALTH_URL never reported commit=$expected (last seen: '$last_commit')"
          exit 1

      - name: Tag deployed commit for review
        # Lightweight tag recording exactly what shipped to prod, so every deploy
        # is reviewable by tag. Non-`v*` namespace so it never becomes a
        # `git describe` base (those are human tier tags only: v0.1.0, v1.0.0).
        run: |
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          tag="deploy/prod/${ts}-$(echo '${{ github.sha }}' | cut -c1-7)"
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/${tag}\",\"sha\":\"${{ github.sha }}\"}"
          echo "Tagged prod deploy: ${tag}"

  external_agent_mcp_e2e:
    name: external-agent MCP E2E
    runs-on: ubuntu-latest
    # Opt-in. tests/e2e/external-agent-mcp.e2e.test.ts (Series A proof 3) drives
    # a real external agent through MCP: ping → wiki read → policy-gated payment
    # intent → audit. It only passes once the agent is actually registered
    # on-chain (Track 1), so it stays gated behind an explicit repo variable +
    # token secret. Without them the test self-skips (describe.skip); gating the
    # whole job keeps the signal honest. A green check means it really ran.
    # Lives here (post-merge) rather than in pr.yml so PRs don't hit a live env
    # or mint $10 ACH intents on every push.
    if: vars.E2E_EXTERNAL_AGENT_ENABLED == 'true'
    # Opt-in but reachable on a push to main once the repo var is on; it hits
    # a shared sandbox tenant's fixed vendor/source account and mints a real
    # $10 ACH intent, so two overlapping runs must not race it.
    concurrency:
      group: external-agent-mcp-e2e-${{ github.ref }}
      cancel-in-progress: false # never cancel a deploy mid-flight
    env:
      # Host root WITHOUT a /v1 suffix. Every e2e path already includes /v1.
      BRAIN_BASE_URL: ${{ vars.E2E_EXTERNAL_AGENT_BASE_URL || 'https://api.sandbox.brain.fi' }}
      BRAIN_EXTERNAL_AGENT_TOKEN: ${{ secrets.BRAIN_EXTERNAL_AGENT_TOKEN }}
      # The 3rd case mints a fixed $10.00 ACH intent. Point these at a THROWAWAY
      # staging tenant's source account + vendor so repeated runs don't trip the
      # idempotency / §6 gate-check 11.5 re-run hazard on a real tenant.
      BRAIN_TEST_SOURCE_ACCT_ID: ${{ vars.E2E_EXTERNAL_AGENT_SOURCE_ACCT_ID }}
      BRAIN_TEST_VENDOR_ID: ${{ vars.E2E_EXTERNAL_AGENT_VENDOR_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: External-agent MCP E2E
        run: pnpm -C tests/e2e run test external-agent-mcp.e2e.test.ts

  testnet_onchain_executor_e2e:
    name: testnet on-chain executor E2E
    runs-on: ubuntu-latest
    # Opt-in (Review 3 P0 8.1). Drives the real OnchainBaseRail against a deployed
    # BrainSmartAccount on Base Sepolia. Stays gated behind an explicit repo
    # variable + RPC/key secrets; without them the test self-skips (describe.skip),
    # and gating the whole job keeps the signal honest. A green check means it
    # really ran. Needs a deployed smart-account address + a gas-funded throwaway
    # session key; the value-moving success case additionally needs a GRANTED key
    # (BRAIN_TESTNET_SUCCESS_ENABLED). See tests/e2e/README.md.
    if: vars.TESTNET_ONCHAIN_E2E_ENABLED == 'true'
    # Opt-in but reachable on a push to main once the repo var is on; it
    # shares one funded testnet session key, so concurrent runs would race
    # its nonce (the same class of hazard as the anchor-key drain incidents).
    concurrency:
      group: testnet-e2e-${{ github.ref }}
      cancel-in-progress: false # never cancel a deploy mid-flight
    env:
      BRAIN_TESTNET_RPC_URL: ${{ secrets.BRAIN_TESTNET_RPC_URL }}
      BRAIN_TESTNET_SESSION_KEY: ${{ secrets.BRAIN_TESTNET_SESSION_KEY }}
      BRAIN_TESTNET_SMART_ACCOUNT: ${{ vars.BRAIN_TESTNET_SMART_ACCOUNT }}
      BRAIN_TESTNET_TARGET: ${{ vars.BRAIN_TESTNET_TARGET }}
      BRAIN_TESTNET_CHAIN_ID: ${{ vars.BRAIN_TESTNET_CHAIN_ID || '84532' }}
      BRAIN_TESTNET_POLICY_VERSION: ${{ vars.BRAIN_TESTNET_POLICY_VERSION }}
      BRAIN_TESTNET_SUCCESS_ENABLED: ${{ vars.BRAIN_TESTNET_SUCCESS_ENABLED }}
      BRAIN_TESTNET_SUCCESS_DATA: ${{ vars.BRAIN_TESTNET_SUCCESS_DATA }}
      BRAIN_TESTNET_SUCCESS_VALUE: ${{ vars.BRAIN_TESTNET_SUCCESS_VALUE }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The test imports the real rail; build the workspaces it resolves.
      - run: pnpm --filter @brain/shared run build && pnpm --filter @brain/execution run build
      - name: Testnet on-chain executor E2E
        run: pnpm -C tests/e2e run test onchain-executor.testnet.e2e.test.ts
