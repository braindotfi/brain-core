# Brain production-mode stack for a single VM (testnet dev-live, Base Sepolia).
#
# Boots the API in NODE_ENV=production with all four surfaces, real on-chain
# settlement (BRAIN_BASE_CHAIN_ID=84532), an S3-compatible blob store (MinIO,
# no Azure dependency), and the production role model (RLS enforced). Unlike
# docker-compose.dev.yml this uses the built runtime image (no bind mounts, no
# watch) and applies the brain_app / brain_wiki_reader / eight §4 least-privilege
# cross-tenant role split that the production boot fences require (brain_privileged
# survives only for the deploy-time seed one-shot).
#
#   1. cp .env.prod.example .env.prod   and fill it in (DB/MinIO passwords +
#      the C-series secrets: AUTH_JWKS_URL, BRAIN_SESSION_KEY, BASE_RPC_URL, …)
#   2. docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#      (add `--profile agents` to also start the Python reasoning agents)
#
# IMPORTANT: pass `--env-file .env.prod`. Compose reads ${VAR} interpolation
# (the DB/MinIO passwords woven into the connection URLs below) from the
# --env-file / ./.env, NOT from a service's `env_file:` entry. Using one file
# for both keeps the role passwords and the URLs that reference them in sync.
# Every ${VAR:-default} has a testnet default, so the stack still boots with no
# file — but override every password before exposing the host.
#
# Boot order is enforced by depends_on conditions:
#   postgres healthy → migrate (owner role, creates tables) completed
#                     → db-roles (creates the 3 app roles, FORCE RLS) completed
#   minio up → minio-setup (creates the bucket) completed
#   all of the above + redis healthy → api
#
# Connection URLs are composed from passwords supplied via compose interpolation
# (the top-level ./.env file or the shell), with testnet-friendly defaults so the
# stack boots out-of-the-box on a fresh VM. Override every *_DB_PASSWORD and the
# MinIO root credentials before exposing the host.

name: brain-prod

# Common runtime env shared by the api and worker processes (worker/process
# separation). The role-specific bits (BRAIN_HTTP_ENABLED / BRAIN_WORKERS and the
# least-privilege role URLs) are set per service so the api never receives the
# worker-only DB credentials.
x-brain-common-env: &brain-common-env
  NODE_ENV: production
  PORT: "3000"
  SERVICE_VERSION: ${SERVICE_VERSION:-0.0.5}
  BRAIN_BASE_CHAIN_ID: "84532"
  AUTH_JWKS_URL: http://jwks:8085/.well-known/jwks.json
  AUTH_ISSUER: ${AUTH_ISSUER:-https://auth.brain.fi}
  AUTH_AUDIENCE: ${AUTH_AUDIENCE:-brain-api}
  DATABASE_URL: postgres://brain_app:${BRAIN_APP_DB_PASSWORD:-brain_app}@postgres:5432/brain
  DATABASE_SSL: disable
  REDIS_URL: redis://redis:6379
  BLOB_BACKEND: s3
  BLOB_CONTAINER: ${BLOB_CONTAINER:-brain-artifacts}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-brainminio}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-brainminio}
  S3_FORCE_PATH_STYLE: "true"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: brain-prod-postgres
    restart: unless-stopped
    environment:
      # The bootstrap superuser/owner. migrate connects as this role; the app
      # connects as the lower-privilege roles created by the db-roles step.
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain}
      POSTGRES_DB: brain
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Create required extensions (pgcrypto for digest()/content-addressing,
      # vector for the Wiki index) on first init — runs before migrations. Only
      # executes on an empty data dir, so existing volumes need the extensions
      # created manually (CREATE EXTENSION IF NOT EXISTS ...).
      - ./tools/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: brain-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    # S3-compatible object store — keeps the blob backend off Azure for a
    # self-contained single-VM deploy (BLOB_BACKEND=s3).
    image: minio/minio:latest
    container_name: brain-prod-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-brainminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-brainminio}
    volumes:
      - minio-data:/data

  # One-shot: wait for MinIO, then create the artifacts bucket. Doubles as the
  # readiness gate for the api (minio's own image has no reliable healthcheck
  # binary across releases, so we gate on this completing instead).
  minio-setup:
    image: minio/mc:latest
    container_name: brain-prod-minio-setup
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-brainminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-brainminio}
      BLOB_CONTAINER: ${BLOB_CONTAINER:-brain-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --with-lock --ignore-existing "local/$$BLOB_CONTAINER"
        echo "bucket $$BLOB_CONTAINER ready"
    restart: "no"

  # One-shot: apply every services/*/migrations/*.sql as the owner role. The
  # runtime image carries both tools/migrate/dist and the migration SQL files
  # (see Dockerfile), so it is self-contained — no bind mount needed.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-migrate
    command: ["node", "tools/migrate/dist/cli.js", "up"]
    environment:
      DATABASE_URL: postgres://brain:${POSTGRES_PASSWORD:-brain}@postgres:5432/brain
      DATABASE_SSL: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # One-shot: create the three application roles and FORCE RLS on tenant tables.
  # Runs AFTER migrate (the FORCE-RLS sweep only sees tables that already exist)
  # and uses the postgres image purely for its psql client. Idempotent — safe to
  # re-run across restarts (see infra/db-roles.sql).
  db-roles:
    image: pgvector/pgvector:pg16
    container_name: brain-prod-db-roles
    volumes:
      - ./infra/db-roles.sql:/db-roles.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-brain}
    # Role passwords are interpolated by compose at parse time (the ${..} form),
    # matching the URLs the api builds below so the credentials line up.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        psql -v ON_ERROR_STOP=1 \
          -h postgres -U brain -d brain \
          -v brain_app_password="${BRAIN_APP_DB_PASSWORD:-brain_app}" \
          -v brain_privileged_password="${BRAIN_PRIVILEGED_DB_PASSWORD:-brain_privileged}" \
          -v brain_wiki_reader_password="${BRAIN_WIKI_DB_PASSWORD:-brain_wiki_reader}" \
          -v brain_raw_worker_password="${BRAIN_RAW_WORKER_DB_PASSWORD:-brain_raw_worker}" \
          -v brain_canonical_projector_password="${BRAIN_CANONICAL_PROJECTOR_DB_PASSWORD:-brain_canonical_projector}" \
          -v brain_ledger_projector_password="${BRAIN_LEDGER_PROJECTOR_DB_PASSWORD:-brain_ledger_projector}" \
          -v brain_execution_worker_password="${BRAIN_EXECUTION_WORKER_DB_PASSWORD:-brain_execution_worker}" \
          -v brain_audit_verifier_password="${BRAIN_AUDIT_VERIFIER_DB_PASSWORD:-brain_audit_verifier}" \
          -v brain_audit_publisher_password="${BRAIN_AUDIT_PUBLISHER_DB_PASSWORD:-brain_audit_publisher}" \
          -v brain_resolver_password="${BRAIN_RESOLVER_DB_PASSWORD:-brain_resolver}" \
          -v brain_tenant_deletion_password="${BRAIN_TENANT_DELETION_DB_PASSWORD:-brain_tenant_deletion}" \
          -v brain_surface_gateway_password="${BRAIN_SURFACE_GATEWAY_DB_PASSWORD:-brain_surface_gateway}" \
          -f /db-roles.sql
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # Demo data seeder (profile "seed" — OFF by default; NOT for real production).
  # Populates the golden-path tenant (accounts, counterparties, invoices) + an
  # active demo policy + a registered payment agent, so the money path works
  # out-of-the-box on a fresh deploy without the signed-policy / on-chain agent
  # ceremonies. Run after the stack is up:
  #   docker compose --env-file .env.prod -f docker-compose.prod.yml --profile seed run --rm seed
  # Set BRAIN_SEED_DEMO_GOVERNANCE=false in .env.prod to seed data only.
  seed:
    profiles: ["seed"]
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-seed
    command: ["node", "tools/seed-golden-path/dist/cli.js"]
    env_file:
      - path: .env.prod
        required: false
    environment:
      # brain_privileged (BYPASSRLS) so the seed can write across the tenant.
      DATABASE_URL: postgres://brain_privileged:${BRAIN_PRIVILEGED_DB_PASSWORD:-brain_privileged}@postgres:5432/brain
      DATABASE_SSL: disable
      BRAIN_TENANT_ID: ${BRAIN_SEED_TENANT_ID:-tnt_00000000010000000000000000}
      BRAIN_ACTOR: golden-path-seed
    depends_on:
      db-roles:
        condition: service_completed_successfully
    restart: "no"

  # Static JWKS sidecar (C1). Publishes the PUBLIC half of AUTH_SIGN_KEY at
  # /.well-known/jwks.json so the API's JWKS verifier has a key source without
  # an external IdP. The same AUTH_SIGN_KEY signs SIWX tokens and is what
  # tools/dev-token mints test JWTs with. Generate a key with:
  #   pnpm --filter @brain/static-jwks run generate   (→ set AUTH_SIGN_KEY in .env.prod)
  jwks:
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-jwks
    restart: unless-stopped
    command: ["node", "tools/static-jwks/dist/server.js"]
    env_file:
      - path: .env.prod
        required: false
    environment:
      PORT: "8085"
    # AUTH_SIGN_KEY (private signing JWK) comes from .env.prod; the server exits
    # at boot if it is unset, so a misconfigured deploy fails fast.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8085/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Operator-supplied secrets (C-series): AUTH_SIGN_KEY,
    # BRAIN_SESSION_KEY, BASE_RPC_URL, BRAIN_ONCHAIN_SMART_ACCOUNT,
    # AUDIT_PUBLISHER_KEY, AUDIT_ANCHOR_ADDRESS, contract addresses,
    # OPENAI_API_KEY, etc. See .env.prod.example. (AUTH_JWKS_URL/ISSUER/AUDIENCE
    # are set below — they point at the in-network jwks sidecar.)
    env_file:
      - path: .env.prod
        required: false
    environment:
      <<: *brain-common-env
      SERVICE_NAME: brain-api
      # HTTP-only (worker/process separation): serves /v1 + /health, runs NO
      # background workers (those live in the `worker` service). Only the role
      # pools its routes use are provided — never the worker-only DB credentials.
      BRAIN_HTTP_ENABLED: "true"
      BRAIN_WORKERS: none
      BRAIN_WIKI_DB_URL: postgres://brain_wiki_reader:${BRAIN_WIKI_DB_PASSWORD:-brain_wiki_reader}@postgres:5432/brain
      BRAIN_RESOLVER_DB_URL: postgres://brain_resolver:${BRAIN_RESOLVER_DB_PASSWORD:-brain_resolver}@postgres:5432/brain
      BRAIN_TENANT_DELETION_DB_URL: postgres://brain_tenant_deletion:${BRAIN_TENANT_DELETION_DB_PASSWORD:-brain_tenant_deletion}@postgres:5432/brain
      BRAIN_AUDIT_VERIFIER_DB_URL: postgres://brain_audit_verifier:${BRAIN_AUDIT_VERIFIER_DB_PASSWORD:-brain_audit_verifier}@postgres:5432/brain
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      db-roles:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      jwks:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 12

  # Background workers (worker/process separation). Same image as the api, but
  # HTTP-disabled and running every worker group; the api process runs none.
  # This decouples worker uptime from api deploys/restarts and keeps the
  # worker-only DB credentials out of the public api runtime. To scale a single
  # concern independently, copy this service with BRAIN_WORKERS=<group> and only
  # that group's role URL(s). Multi-replica safe: every worker holds a per-worker
  # pg advisory lease (one active at a time, failover on crash), so running >1
  # replica gives availability without double-work.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-worker
    restart: unless-stopped
    command: ["node", "services/api/dist/main.js"]
    env_file:
      - path: .env.prod
        required: false
    environment:
      <<: *brain-common-env
      SERVICE_NAME: brain-worker
      BRAIN_HTTP_ENABLED: "false"
      BRAIN_WORKERS: all
      # Worker-only role URLs (no resolver: that is request-path only).
      BRAIN_RAW_WORKER_DB_URL: postgres://brain_raw_worker:${BRAIN_RAW_WORKER_DB_PASSWORD:-brain_raw_worker}@postgres:5432/brain
      BRAIN_CANONICAL_PROJECTOR_DB_URL: postgres://brain_canonical_projector:${BRAIN_CANONICAL_PROJECTOR_DB_PASSWORD:-brain_canonical_projector}@postgres:5432/brain
      BRAIN_LEDGER_PROJECTOR_DB_URL: postgres://brain_ledger_projector:${BRAIN_LEDGER_PROJECTOR_DB_PASSWORD:-brain_ledger_projector}@postgres:5432/brain
      BRAIN_EXECUTION_WORKER_DB_URL: postgres://brain_execution_worker:${BRAIN_EXECUTION_WORKER_DB_PASSWORD:-brain_execution_worker}@postgres:5432/brain
      BRAIN_AUDIT_VERIFIER_DB_URL: postgres://brain_audit_verifier:${BRAIN_AUDIT_VERIFIER_DB_PASSWORD:-brain_audit_verifier}@postgres:5432/brain
      BRAIN_AUDIT_PUBLISHER_DB_URL: postgres://brain_audit_publisher:${BRAIN_AUDIT_PUBLISHER_DB_PASSWORD:-brain_audit_publisher}@postgres:5432/brain
      BRAIN_TENANT_DELETION_DB_URL: postgres://brain_tenant_deletion:${BRAIN_TENANT_DELETION_DB_PASSWORD:-brain_tenant_deletion}@postgres:5432/brain
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      db-roles:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 12

  surface-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-core:${BRAIN_IMAGE_TAG:-prod}
    container_name: brain-prod-surface-gateway
    restart: unless-stopped
    command: ["node", "services/surface-gateway/dist/main.js"]
    ports:
      - "3002:3000"
    env_file:
      - path: .env.prod
        required: false
    environment:
      <<: *brain-common-env
      SERVICE_NAME: brain-surface-gateway
      BRAIN_SURFACE_GATEWAY_DB_URL: postgres://brain_surface_gateway:${BRAIN_SURFACE_GATEWAY_DB_PASSWORD:-brain_surface_gateway}@postgres:5432/brain
      BRAIN_RESOLVER_DB_URL: postgres://brain_resolver:${BRAIN_RESOLVER_DB_PASSWORD:-brain_resolver}@postgres:5432/brain
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      TEAMS_ENABLED: ${TEAMS_ENABLED:-false}
      TEAMS_APP_ID: ${TEAMS_APP_ID:-}
      TEAMS_APP_PASSWORD: ${TEAMS_APP_PASSWORD:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_APPROVAL_BASE_URL: ${EMAIL_APPROVAL_BASE_URL:-https://api.brain.fi/surfaces/email/approve}
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET:-}
      EMAIL_ENDPOINT: ${EMAIL_ENDPOINT:-}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      BRAIN_SURFACE_SMOKE_ENABLED: ${BRAIN_SURFACE_SMOKE_ENABLED:-false}
      BRAIN_SURFACE_SMOKE_SECRET: ${BRAIN_SURFACE_SMOKE_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      db-roles:
        condition: service_completed_successfully
      jwks:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 12

  # Python reasoning agents. Off by default — enable with `--profile agents`.
  # Requires OPENAI_API_KEY, BRAIN_API_TOKEN, and BRAIN_AGENTS_INBOUND_SECRET
  # in .env.prod (the image now fails fast at boot if these are unset, see
  # services/agents/brain_agents/server.py).
  agents:
    profiles: ["agents"]
    build:
      context: services/agents
      dockerfile: Dockerfile
    container_name: brain-prod-agents
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      BRAIN_ENV: production
      NODE_ENV: production
      BRAIN_API_BASE_URL: http://api:3000
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg-data:
  redis-data:
  minio-data:
